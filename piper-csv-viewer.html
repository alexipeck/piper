<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piper Telemetry Viewer</title>
  <!-- Session (path, columns, zoom, etc.) is saved in localStorage and restored on reload via path re-fetch. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 13px;
      background: #14161a;
      color: #d8dce3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
      padding: 10px 14px;
      border-bottom: 1px solid #2a2f38;
      background: #1a1d23;
      flex-shrink: 0;
    }
    .toolbar label { color: #8b93a1; }
    .file-picker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .file-picker-btn {
      font-size: 12px;
      padding: 4px 10px;
      background: #2a3140;
      border: 1px solid #3d4656;
      color: #d8dce3;
      border-radius: 4px;
      white-space: nowrap;
    }
    .file-picker:hover .file-picker-btn { background: #354052; }
    .file-picker-input {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .file-picker-name {
      color: #8b93a1;
      font-size: 12px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .toolbar input[type="text"].csv-path {
      flex: 1;
      min-width: 180px;
      max-width: 480px;
      padding: 4px 8px;
      border: 1px solid #3d4656;
      border-radius: 4px;
      background: #14161a;
      color: #d8dce3;
      font-size: 12px;
    }
    .toolbar input[type="range"] { width: 140px; }
    .toolbar button {
      background: #2a3140;
      border: 1px solid #3d4656;
      color: #d8dce3;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #354052; }
    .drop-hint {
      color: #6b7280;
      font-size: 12px;
    }
    .drop-hint.drag-over { color: #7eb8ff; }
    .row-label { min-width: 72px; font-variant-numeric: tabular-nums; }
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid #2a2f38;
      display: flex;
      flex-direction: column;
      background: #181b21;
    }
    .sidebar-head {
      padding: 10px;
      border-bottom: 1px solid #2a2f38;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sidebar-head input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #3d4656;
      border-radius: 4px;
      background: #14161a;
      color: #d8dce3;
    }
    .sidebar-actions { display: flex; gap: 6px; }
    .sidebar-actions button {
      flex: 1;
      font-size: 11px;
      padding: 4px 6px;
      background: #2a3140;
      border: 1px solid #3d4656;
      color: #d8dce3;
      border-radius: 4px;
      cursor: pointer;
    }
    .sidebar-actions button:hover { background: #354052; }
    .mini-btn {
      font-size: 11px;
      padding: 2px 6px;
      background: #2a3140;
      border: 1px solid #3d4656;
      color: #d8dce3;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .mini-btn:hover { background: #354052; }
    .dash-section {
      border-bottom: 1px solid #2a2f38;
      padding: 8px 10px;
      flex-shrink: 0;
    }
    .dash-section.scrollable {
      max-height: 160px;
      overflow-y: auto;
    }
    .dash-title {
      font-size: 11px;
      color: #8b93a1;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .dash-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .dash-presets button {
      font-size: 11px;
      padding: 3px 8px;
      background: #2a3140;
      border: 1px solid #3d4656;
      color: #d8dce3;
      border-radius: 4px;
      cursor: pointer;
    }
    .dash-presets button:hover { background: #354052; }
    .dash-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
      font-size: 11px;
      cursor: pointer;
    }
    .dash-row:hover { background: #22262e; }
    .dash-row.focused { background: #253045; color: #d8dce3; }
    .dash-row input { margin: 0; cursor: pointer; }
    .dash-row span {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .chart-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 200px;
      border-bottom: 1px solid #2a2f38;
      background: #14161a;
    }
    .chart-head {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 6px 14px;
      flex-shrink: 0;
      color: #8b93a1;
      font-size: 12px;
    }
    .chart-head label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .chart-head button {
      background: #2a3140;
      border: 1px solid #3d4656;
      color: #d8dce3;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }
    .chart-head button:hover:not(:disabled) { background: #354052; }
    .chart-head button:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .chart-head .chart-hint {
      color: #6b7280;
      font-size: 11px;
    }
    .chart-wrap .u-select {
      background: rgba(126, 184, 255, 0.14);
      border: 1px solid rgba(126, 184, 255, 0.55);
    }
    .chart-head .y-range {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      flex-wrap: wrap;
    }
    .chart-head .y-range input[type="number"] {
      width: 72px;
      padding: 4px 6px;
      border: 1px solid #3d4656;
      border-radius: 4px;
      background: #14161a;
      color: #d8dce3;
      font-variant-numeric: tabular-nums;
    }
    .chart-head .y-range .y-range-hint {
      color: #6b7280;
      font-size: 11px;
    }
    .chart-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      padding: 0 8px 4px;
      overflow: visible;
    }
    .chart-wrap .uplot {
      font-family: inherit;
    }
    .chart-wrap .u-legend { display: none; }
    #chartHost { width: 100%; height: 100%; overflow: visible; }
    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      padding: 4px 14px 8px;
      flex-shrink: 0;
      max-height: 56px;
      overflow-y: auto;
    }
    .chart-series-hint {
      color: #7eb8ff;
      font-size: 11px;
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 1;
      min-width: 0;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #8b93a1;
      cursor: pointer;
    }
    .legend-item:hover { color: #b8c0cc; }
    .legend-item.picked {
      color: #d8dce3;
      font-weight: 600;
    }
    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .inspector {
      flex-shrink: 0;
      max-height: 180px;
      overflow: auto;
      border-top: 1px solid #2a2f38;
      background: #181b21;
      padding: 10px 14px;
    }
    .detail h3 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 600;
      color: #8b93a1;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 4px 16px;
    }
    .detail-pair {
      display: flex;
      gap: 8px;
      font-size: 12px;
      min-width: 0;
    }
    .detail-pair dt {
      margin: 0;
      color: #7eb8ff;
      flex-shrink: 0;
      max-width: 50%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .detail-pair dd {
      margin: 0;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .empty-state {
      padding: 24px;
      color: #6b7280;
      text-align: center;
    }
    .status { color: #8b93a1; font-size: 12px; }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <label class="file-picker">
      <span class="file-picker-btn">Choose file</span>
      <input type="file" id="fileInput" class="file-picker-input" accept=".piper.csv,.csv,text/csv">
      <span class="file-picker-name" id="fileInputLabel">No file chosen</span>
    </label>
    <input type="text" class="csv-path" id="csvPathInput" placeholder="C:\full\path\to\file.piper.csv">
    <button type="button" id="csvPathLoad">Load path</button>
    <button type="button" id="clearSaved">Clear saved</button>
    <span class="drop-hint" id="dropHint">Session saves path and settings — reload restores via path field</span>
    <label><input type="checkbox" id="logScale"> Log Y</label>
    <button type="button" id="prevRow" disabled>&larr;</button>
    <input type="range" id="rowSlider" min="0" max="0" value="0" disabled>
    <button type="button" id="nextRow" disabled>&rarr;</button>
    <span class="row-label" id="rowLabel">—</span>
    <span class="status" id="status"></span>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div class="dash-section">
        <div class="dash-title">Presets</div>
        <div class="dash-presets" id="presetButtons"></div>
      </div>
      <div class="sidebar-scroll">
        <div class="dash-section scrollable">
          <div class="dash-title">Topology</div>
          <div id="topologyList"></div>
        </div>
        <div class="dash-section">
          <div class="dash-title">Categories</div>
          <div id="categoryToggles"></div>
        </div>
        <div class="dash-section scrollable">
          <div class="dash-title">Metrics</div>
          <div id="metricToggles"></div>
        </div>
        <div class="dash-section scrollable">
          <div class="dash-title">Objects</div>
          <div id="objectToggles"></div>
        </div>
      </div>
    </aside>
    <div class="main">
      <section class="chart-section" id="chartSection">
        <div class="chart-head">
          <span>Graph — drag to zoom X (elapsed_ms)</span>
          <button type="button" id="xZoomReset" disabled>Reset X zoom</button>
          <span class="chart-hint" id="xZoomHint"></span>
          <span class="chart-series-hint" id="chartSeriesHint">Click a line to identify</span>
          <div class="y-range">
            <span>Y min</span>
            <input type="text" id="yMinOverride" inputmode="decimal" placeholder="auto" disabled>
            <span>Y max</span>
            <input type="text" id="yMaxOverride" inputmode="decimal" placeholder="auto" disabled>
            <button type="button" id="yRangeFromData" disabled>From data</button>
            <button type="button" id="yRangeApply" disabled>Apply</button>
            <button type="button" id="yRangeAuto" disabled>Auto</button>
            <span class="y-range-hint" id="yRangeHint"></span>
          </div>
        </div>
        <div class="chart-wrap" id="chartWrap">
          <p class="empty-state" id="chartEmpty">Load a Piper telemetry log and enable metrics to graph.</p>
          <div id="chartHost"></div>
        </div>
        <div class="chart-legend" id="chartLegend"></div>
      </section>
      <section class="inspector" id="inspectorPanel" hidden>
        <h3 id="inspectorTitle">Sample inspector</h3>
        <dl class="detail-grid" id="inspectorGrid"></dl>
      </section>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
  <script>
    const CHART_COLORS = [
      "#7eb8ff", "#f59e0b", "#34d399", "#f472b6", "#a78bfa",
      "#fb7185", "#38bdf8", "#fbbf24", "#4ade80", "#c084fc",
    ];

    const CATEGORIES = ["Pipeline", "Links", "Stages", "Anchors", "External"];
    const PRESETS = {
      Queues: ["len", "smoothed_len", "trend"],
      Rates: ["arrival_rate", "drain_rate", "net_rate", "external_input_rate", "external_output_rate"],
      Workers: ["active_threads", "desired_workers", "total_active_workers", "parked_threads", "global_worker_cap"],
      Anchors: ["probe_state", "last_probe_outcome", "last_probe_reason", "max_threads", "fixed_threads"],
      External: ["external_input_rate", "external_output_rate"],
    };

    const state = {
      manifest: null,
      headers: [],
      metricsByColumn: new Map(),
      columnData: new Map(),
      sampleCount: 0,
      enabledCategories: new Set(CATEGORIES),
      enabledMetrics: new Set(),
      focusedObjectIds: new Set(),
      selectedRowIndex: 0,
      logScale: false,
      yMin: null,
      yMax: null,
      xFullMin: null,
      xFullMax: null,
      xZoomMin: null,
      xZoomMax: null,
      plot: null,
      syncingCursor: false,
      csvPath: null,
      chartSeriesCols: [],
      pickedPlotSeries: null,
      xValues: null,
      seriesCache: null,
      chartLogScale: false,
      chartYLocked: false,
    };

    let storageApplyDepth = 0;
    let storageSaveTimer = null;
    const STORAGE_KEY = "piperViewerSave";
    const CSV_CACHE_KEY = "piperViewerCsvCache";

    function pathKey(path) {
      return (path || "").trim().replace(/\\/g, "/").toLowerCase();
    }

    function buildConfigFromState() {
      if (state.headers.length === 0) return null;
      const cfg = {};
      const visibleNames = activeSeriesColumns();
      if (visibleNames.length === state.metricsByColumn.size) cfg.cols = "all";
      else if (visibleNames.length === 0) cfg.cols = "none";
      else cfg.cols = visibleNames;
      if (state.logScale) cfg.log = true;
      if (state.selectedRowIndex > 0) cfg.row = state.selectedRowIndex;
      if (state.enabledCategories.size !== CATEGORIES.length) {
        cfg.categories = [...state.enabledCategories];
      }
      if (state.enabledMetrics.size > 0) cfg.metrics = [...state.enabledMetrics];
      if (state.focusedObjectIds.size > 0) cfg.objects = [...state.focusedObjectIds];
      if (state.yMin != null) cfg.ymin = state.yMin;
      if (state.yMax != null) cfg.ymax = state.yMax;
      if (hasXZoom()) {
        cfg.xmin = state.xZoomMin;
        cfg.xmax = state.xZoomMax;
      }
      return Object.keys(cfg).length > 0 ? cfg : null;
    }

    function loadSavedState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (_) {
        return null;
      }
    }

    function loadCsvCache(path) {
      try {
        const raw = localStorage.getItem(CSV_CACHE_KEY);
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (cached?.csvText && pathKey(cached.path) === pathKey(path)) return cached.csvText;
      } catch (_) {}
      return null;
    }

    function persistCsvCache(text, path) {
      if (!text || !path) return;
      try {
        localStorage.setItem(
          CSV_CACHE_KEY,
          JSON.stringify({ path: pathKey(path), csvText: text })
        );
      } catch (_) {}
    }

    function persistToStorage() {
      if (storageApplyDepth > 0 || state.headers.length === 0) return;
      const path = (state.csvPath || csvPathInput.value || "").trim() || null;
      try {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({
            csvPath: path,
            config: buildConfigFromState(),
          })
        );
      } catch (_) {
        statusEl.textContent =
          (statusEl.textContent ? statusEl.textContent + " — " : "") +
          "Could not save session (browser storage may be full).";
      }
    }

    function scheduleStorageSave() {
      if (storageApplyDepth > 0) return;
      clearTimeout(storageSaveTimer);
      storageSaveTimer = setTimeout(persistToStorage, 150);
    }

    function updateFileLabel() {
      const path =
        state.csvPath ||
        csvPathInput.value.trim() ||
        fileInput.files?.[0]?.name ||
        "";
      if (!path) {
        fileInputLabel.textContent = "No file chosen";
        fileInputLabel.title = "";
        return;
      }
      const base = path.replace(/^.*[/\\]/, "") || path;
      fileInputLabel.textContent = base;
      fileInputLabel.title = path;
    }

    const fileInput = document.getElementById("fileInput");
    const fileInputLabel = document.getElementById("fileInputLabel");
    const csvPathInput = document.getElementById("csvPathInput");
    const csvPathLoad = document.getElementById("csvPathLoad");
    const clearSaved = document.getElementById("clearSaved");
    const dropHint = document.getElementById("dropHint");
    const logScaleEl = document.getElementById("logScale");
    const chartWrap = document.getElementById("chartWrap");
    const chartHost = document.getElementById("chartHost");
    const chartEmpty = document.getElementById("chartEmpty");
    const chartLegend = document.getElementById("chartLegend");
    const chartSection = document.getElementById("chartSection");
    const yMinOverride = document.getElementById("yMinOverride");
    const yMaxOverride = document.getElementById("yMaxOverride");
    const yRangeFromData = document.getElementById("yRangeFromData");
    const yRangeApply = document.getElementById("yRangeApply");
    const yRangeAuto = document.getElementById("yRangeAuto");
    const yRangeHint = document.getElementById("yRangeHint");
    const xZoomReset = document.getElementById("xZoomReset");
    const xZoomHint = document.getElementById("xZoomHint");
    const chartSeriesHint = document.getElementById("chartSeriesHint");
    const rowSlider = document.getElementById("rowSlider");
    const prevRow = document.getElementById("prevRow");
    const nextRow = document.getElementById("nextRow");
    const rowLabel = document.getElementById("rowLabel");
    const statusEl = document.getElementById("status");
    const presetButtons = document.getElementById("presetButtons");
    const topologyList = document.getElementById("topologyList");
    const categoryToggles = document.getElementById("categoryToggles");
    const metricToggles = document.getElementById("metricToggles");
    const objectToggles = document.getElementById("objectToggles");
    const inspectorPanel = document.getElementById("inspectorPanel");
    const inspectorTitle = document.getElementById("inspectorTitle");
    const inspectorGrid = document.getElementById("inspectorGrid");

    function parseCsvLine(line) {
      const fields = [];
      let i = 0;
      let field = "";
      while (i < line.length) {
        if (line[i] === '"') {
          i += 1;
          while (i < line.length) {
            if (line[i] === '"') {
              if (line[i + 1] === '"') {
                field += '"';
                i += 2;
              } else {
                i += 1;
                break;
              }
            } else {
              field += line[i];
              i += 1;
            }
          }
          if (line[i] === ",") i += 1;
        } else {
          while (i < line.length && line[i] !== ",") {
            field += line[i];
            i += 1;
          }
          if (line[i] === ",") i += 1;
        }
        fields.push(field);
        field = "";
      }
      return fields;
    }

    function parsePiperLog(text) {
      const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n").filter((l) => l.length > 0);
      if (lines.length < 3) throw new Error("Not a Piper telemetry log");
      if (lines[0] !== "# piper-telemetry-log-v1") throw new Error("Missing telemetry version line");
      if (!lines[1].startsWith("# manifest ")) throw new Error("Missing manifest line");
      const manifest = JSON.parse(lines[1].slice("# manifest ".length));
      const headers = parseCsvLine(lines[2]);
      const sampleCount = lines.length - 3;
      const columnData = new Map();
      for (const header of headers) {
        columnData.set(header, { numeric: null, values: new Array(sampleCount) });
      }
      for (let r = 0; r < sampleCount; r++) {
        const cells = parseCsvLine(lines[3 + r]);
        for (let c = 0; c < headers.length; c++) {
          const header = headers[c];
          const raw = cells[c] ?? "";
          const col = columnData.get(header);
          if (header === "elapsed_ms") {
            col.numeric = true;
            col.values[r] = Number(raw);
            continue;
          }
          const n = Number(raw);
          if (col.numeric !== false && Number.isFinite(n) && raw !== "") {
            col.numeric = true;
            col.values[r] = n;
          } else {
            col.numeric = false;
            col.values[r] = raw;
          }
        }
      }
      const metricsByColumn = new Map();
      for (const metric of manifest.metrics || []) {
        metricsByColumn.set(metric.column, metric);
      }
      return { manifest, headers, columnData, metricsByColumn, sampleCount };
    }

    function metricIsPlottable(metric) {
      if (!metric || metric.column === "elapsed_ms") return false;
      if (metric.unit) return true;
      if (/_state$|_outcome$|_reason$|_trend$/.test(metric.metric)) return false;
      if (/requested|pressure|backpressure|operation$/.test(metric.metric)) return false;
      const col = state.columnData.get(metric.column);
      return col?.numeric === true;
    }

    function objectLabel(objectId) {
      if (!state.manifest) return objectId;
      if (objectId === "pipeline") return "Pipeline";
      const link = (state.manifest.links || []).find((entry) => entry.id === objectId);
      if (link) return link.label;
      const stage = (state.manifest.stages || []).find((entry) => entry.id === objectId);
      if (stage) return stage.name;
      const anchor = (state.manifest.anchors || []).find((entry) => entry.id === objectId);
      if (anchor) return anchor.name;
      return objectId;
    }

    function seriesLabel(column) {
      const metric = state.metricsByColumn.get(column);
      if (!metric) return column;
      const object = objectLabel(metric.object_id);
      return `${object} · ${metric.label}`;
    }

    function columnMatchesFilters(column) {
      const metric = state.metricsByColumn.get(column);
      if (!metric || !metricIsPlottable(metric)) return false;
      if (!state.enabledCategories.has(metric.category)) return false;
      if (state.enabledMetrics.has("__none__")) return false;
      if (state.enabledMetrics.size > 0 && !state.enabledMetrics.has(metric.metric)) return false;
      if (state.focusedObjectIds.size > 0 && !state.focusedObjectIds.has(metric.object_id)) return false;
      return true;
    }

    function activeSeriesColumns() {
      return [...state.metricsByColumn.keys()].filter((column) => columnMatchesFilters(column));
    }

    function buildDataCaches() {
      const n = state.sampleCount;
      const elapsed = state.columnData.get("elapsed_ms");
      state.xValues = elapsed?.values ? elapsed.values.slice() : new Array(n).fill(0).map((_, i) => i);
      state.seriesCache = new Map();
      for (const column of activeSeriesColumns()) {
        const col = state.columnData.get(column);
        if (!col?.numeric) continue;
        state.seriesCache.set(column, col.values.slice());
      }
    }

    function seriesColsEqual(a, b) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
      return true;
    }

    function buildChartData(series) {
      const data = [state.xValues];
      for (const column of series) data.push(state.seriesCache.get(column));
      return data;
    }

    function rowIndexRangeForXRange(xMin, xMax) {
      const x = state.xValues;
      if (!x || x.length === 0) return { start: 0, end: 0 };
      let lo = 0;
      let hi = x.length;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (x[mid] < xMin) lo = mid + 1;
        else hi = mid;
      }
      const start = lo;
      lo = start;
      hi = x.length;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (x[mid] <= xMax) lo = mid + 1;
        else hi = mid;
      }
      return { start, end: lo };
    }

    function applySavedConfigUiOnly(cfg) {
      if (!cfg) return;
      storageApplyDepth++;
      try {
        if (cfg.log != null) {
          state.logScale = cfg.log;
          logScaleEl.checked = cfg.log;
        }
        if (cfg.ymin != null || cfg.ymax != null) {
          state.yMin = cfg.ymin ?? null;
          state.yMax = cfg.ymax ?? null;
          yMinOverride.value = cfg.ymin != null ? String(cfg.ymin) : "";
          yMaxOverride.value = cfg.ymax != null ? String(cfg.ymax) : "";
        }
      } finally {
        storageApplyDepth--;
      }
    }

    function applySavedConfig(cfg) {
      if (!cfg || state.headers.length === 0) return;
      storageApplyDepth++;
      try {
        if (cfg.categories) {
          state.enabledCategories = new Set(cfg.categories);
        }
        if (cfg.metrics) {
          state.enabledMetrics = new Set(cfg.metrics);
        }
        if (cfg.objects) {
          state.focusedObjectIds = new Set(cfg.objects);
        }
        if (cfg.cols === "none") {
          state.enabledMetrics = new Set(["__none__"]);
        } else if (Array.isArray(cfg.cols)) {
          state.enabledMetrics = new Set(
            cfg.cols
              .map((column) => state.metricsByColumn.get(column)?.metric)
              .filter(Boolean)
          );
        }
        if (cfg.log != null) {
          state.logScale = cfg.log;
          logScaleEl.checked = cfg.log;
        }
        if (cfg.ymin != null || cfg.ymax != null) {
          state.yMin = cfg.ymin ?? null;
          state.yMax = cfg.ymax ?? null;
          yMinOverride.value = cfg.ymin != null ? String(cfg.ymin) : "";
          yMaxOverride.value = cfg.ymax != null ? String(cfg.ymax) : "";
          yRangeHint.textContent = hasYRangeLock() ? formatYRangeHint() : "";
        }
        if (cfg.xmin != null && cfg.xmax != null && cfg.xmax > cfg.xmin) {
          state.xZoomMin = cfg.xmin;
          state.xZoomMax = cfg.xmax;
        }
        buildDashboard();
        if (cfg.row != null && state.sampleCount > 0) {
          const ri = Math.max(0, Math.min(cfg.row, state.sampleCount - 1));
          state.selectedRowIndex = ri;
          rowSlider.value = String(ri);
        }
        updateRowControls();
        renderAll();
      } finally {
        storageApplyDepth--;
      }
      scheduleStorageSave();
    }

    function isFullFilesystemPath(p) {
      if (!p) return false;
      return (
        /^file:\/\//i.test(p) ||
        /^[a-zA-Z]:[\\/]/.test(p) ||
        p.startsWith("\\\\") ||
        (p.startsWith("/") && p.length > 1)
      );
    }

    function encodeFilePathSegment(seg) {
      if (seg === "") return "";
      if (/^[a-zA-Z]:$/.test(seg)) return seg;
      return encodeURIComponent(seg);
    }

    function slashPathToFileUrl(slashPath) {
      const encoded = slashPath
        .split("/")
        .map(encodeFilePathSegment)
        .join("/");
      if (/^\/[a-zA-Z]:\//.test(slashPath) || /^\/[a-zA-Z]:$/.test(slashPath)) {
        return "file://" + encoded;
      }
      if (slashPath.startsWith("//")) return "file:" + encoded;
      return "file://" + encoded;
    }

    function resolveCsvFetchUrl(pathParam) {
      const trimmed = pathParam.trim();
      if (!trimmed) return null;
      if (/^file:\/\//i.test(trimmed)) {
        try {
          return new URL(trimmed).href;
        } catch {
          return slashPathToFileUrl(trimmed.replace(/^file:\/\//i, "/"));
        }
      }
      let slashPath = trimmed.replace(/\\/g, "/");
      if (/^[a-zA-Z]:/.test(slashPath)) slashPath = "/" + slashPath;
      else if (trimmed.startsWith("\\\\")) {
        slashPath = "//" + trimmed.slice(2).replace(/\\/g, "/");
      } else if (!slashPath.startsWith("/")) {
        try {
          return new URL(trimmed, location.href).href;
        } catch {
          return null;
        }
      }
      return slashPathToFileUrl(slashPath);
    }

    function csvFetchTargets(pathParam) {
      const targets = [];
      const seen = new Set();
      const add = (u) => {
        if (u && !seen.has(u)) {
          seen.add(u);
          targets.push(u);
        }
      };
      const base = pathParam.replace(/^.*[/\\]/, "");
      if (base) {
        try {
          add(new URL(base, location.href).href);
        } catch (_) {}
      }
      add(resolveCsvFetchUrl(pathParam));
      if (!isFullFilesystemPath(pathParam) && !pathParam.includes("/") && !pathParam.includes("\\")) {
        try {
          add(new URL(pathParam, location.href).href);
        } catch (_) {}
      }
      return targets;
    }

    function localFileAccessHint() {
      if (location.protocol !== "file:") return "";
      return " Browser security may block path loading from file://. Use Choose file, or serve this directory with `python3 -m http.server` and open the viewer through localhost.";
    }

    function loadCsvFromPath(pathParam, savedConfig, opts = {}) {
      const path = pathParam.trim();
      if (!path) return;
      const previousPath = state.csvPath;
      statusEl.textContent = `Loading: ${path}`;
      csvPathInput.value = path;
      const targets = csvFetchTargets(path);
      const tryFallback = () => {
        const cached =
          opts.fallbackText ||
          loadCsvCache(path) ||
          (opts.legacySaved?.csvText &&
          pathKey(opts.legacySaved.csvPath || path) === pathKey(path)
            ? opts.legacySaved.csvText
            : null);
        if (cached) {
          loadCsvText(cached, path, savedConfig);
          return;
        }
        const shown =
          state.headers.length && previousPath && pathKey(previousPath) !== pathKey(path)
            ? ` Still showing: ${previousPath}.`
            : "";
        statusEl.textContent = `Could not load: ${path}.${shown}${localFileAccessHint()}`;
      };
      const tryNext = (i) => {
        if (i >= targets.length) {
          tryFallback();
          return;
        }
        fetch(targets[i])
          .then((r) => {
            if (!r.ok) throw new Error(r.statusText);
            return r.text();
          })
          .then((text) => loadCsvText(text, path, savedConfig))
          .catch((error) => {
            console.warn("CSV load failed", targets[i], error);
            tryNext(i + 1);
          });
      };
      if (targets.length === 0) {
        tryFallback();
        return;
      }
      tryNext(0);
    }

    function uniqueMetrics() {
      const metrics = new Set();
      for (const entry of state.metricsByColumn.values()) {
        if (metricIsPlottable(entry)) metrics.add(entry.metric);
      }
      return [...metrics].sort();
    }

    function uniqueObjects() {
      const objects = new Map();
      for (const entry of state.metricsByColumn.values()) {
        if (metricIsPlottable(entry)) objects.set(entry.object_id, entry.object_kind);
      }
      return [...objects.entries()].sort((a, b) => objectLabel(a[0]).localeCompare(objectLabel(b[0])));
    }

    function applyPreset(name) {
      const metrics = PRESETS[name];
      if (!metrics) return;
      state.enabledMetrics = new Set(metrics);
      state.focusedObjectIds.clear();
      buildDashboard();
      renderAll();
      scheduleStorageSave();
    }

    function buildDashboard() {
      presetButtons.replaceChildren();
      for (const name of Object.keys(PRESETS)) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = name;
        btn.addEventListener("click", () => applyPreset(name));
        presetButtons.appendChild(btn);
      }

      topologyList.replaceChildren();
      for (const link of state.manifest?.links || []) {
        const row = document.createElement("label");
        row.className = "dash-row";
        row.dataset.objectId = link.id;
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = state.focusedObjectIds.has(link.id);
        const span = document.createElement("span");
        span.textContent = `Link: ${link.label}`;
        row.append(cb, span);
        row.addEventListener("click", (e) => {
          if (e.target === cb) return;
          cb.checked = !cb.checked;
          cb.dispatchEvent(new Event("change"));
        });
        cb.addEventListener("change", () => {
          if (cb.checked) state.focusedObjectIds.add(link.id);
          else state.focusedObjectIds.delete(link.id);
          row.classList.toggle("focused", cb.checked);
          if (cb.checked) {
            state.enabledMetrics.add("arrival_rate");
            state.enabledMetrics.add("drain_rate");
            state.enabledMetrics.add("len");
          }
          buildMetricToggles();
          renderAll();
          scheduleStorageSave();
        });
        row.classList.toggle("focused", cb.checked);
        topologyList.appendChild(row);
      }
      for (const stage of state.manifest?.stages || []) {
        const row = document.createElement("label");
        row.className = "dash-row";
        row.dataset.objectId = stage.id;
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = state.focusedObjectIds.has(stage.id);
        const span = document.createElement("span");
        span.textContent = `Stage: ${stage.name}`;
        row.append(cb, span);
        row.addEventListener("click", (e) => {
          if (e.target === cb) return;
          cb.checked = !cb.checked;
          cb.dispatchEvent(new Event("change"));
        });
        cb.addEventListener("change", () => {
          if (cb.checked) state.focusedObjectIds.add(stage.id);
          else state.focusedObjectIds.delete(stage.id);
          row.classList.toggle("focused", cb.checked);
          renderAll();
          scheduleStorageSave();
        });
        row.classList.toggle("focused", cb.checked);
        topologyList.appendChild(row);
      }

      categoryToggles.replaceChildren();
      for (const category of CATEGORIES) {
        const row = document.createElement("label");
        row.className = "dash-row";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = state.enabledCategories.has(category);
        const span = document.createElement("span");
        span.textContent = category;
        row.append(cb, span);
        cb.addEventListener("change", () => {
          if (cb.checked) state.enabledCategories.add(category);
          else state.enabledCategories.delete(category);
          renderAll();
          scheduleStorageSave();
        });
        categoryToggles.appendChild(row);
      }

      buildMetricToggles();
      buildObjectToggles();
    }

    function buildMetricToggles() {
      metricToggles.replaceChildren();
      for (const metric of uniqueMetrics()) {
        const row = document.createElement("label");
        row.className = "dash-row";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = state.enabledMetrics.size === 0 || state.enabledMetrics.has(metric);
        const span = document.createElement("span");
        span.textContent = metric.replaceAll("_", " ");
        row.append(cb, span);
        cb.addEventListener("change", () => {
          if (state.enabledMetrics.size === 0) {
            state.enabledMetrics = new Set(uniqueMetrics());
          }
          if (cb.checked) state.enabledMetrics.add(metric);
          else state.enabledMetrics.delete(metric);
          renderAll();
          scheduleStorageSave();
        });
        metricToggles.appendChild(row);
      }
    }

    function buildObjectToggles() {
      objectToggles.replaceChildren();
      for (const [objectId] of uniqueObjects()) {
        const row = document.createElement("label");
        row.className = "dash-row";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = state.focusedObjectIds.size === 0 || state.focusedObjectIds.has(objectId);
        const span = document.createElement("span");
        span.textContent = objectLabel(objectId);
        row.append(cb, span);
        cb.addEventListener("change", () => {
          if (state.focusedObjectIds.size === 0) {
            state.focusedObjectIds = new Set(uniqueObjects().map(([id]) => id));
          }
          if (cb.checked) state.focusedObjectIds.add(objectId);
          else state.focusedObjectIds.delete(objectId);
          renderAll();
          scheduleStorageSave();
        });
        objectToggles.appendChild(row);
      }
    }

    function loadCsvText(text, name, savedConfig) {
      const parsed = parsePiperLog(text);
      state.manifest = parsed.manifest;
      state.headers = parsed.headers;
      state.columnData = parsed.columnData;
      state.metricsByColumn = parsed.metricsByColumn;
      state.sampleCount = parsed.sampleCount;
      const pathLabel = (name || "").trim() || state.csvPath || "saved.piper.csv";
      state.csvPath = pathLabel;
      csvPathInput.value = pathLabel;
      state.enabledCategories = new Set(CATEGORIES);
      state.enabledMetrics = new Set(["arrival_rate", "drain_rate", "len", "busy_ratio"]);
      state.focusedObjectIds = new Set();
      buildDataCaches();
      state.selectedRowIndex = state.sampleCount > 0 ? 0 : -1;
      state.yMin = null;
      state.yMax = null;
      state.xZoomMin = null;
      state.xZoomMax = null;
      yMinOverride.value = "";
      yMaxOverride.value = "";
      yRangeHint.textContent = "";
      refreshFullXExtents();
      updateXZoomUi();
      let status = `${pathLabel}: ${state.sampleCount} samples, ${state.headers.length} columns`;
      if (!isFullFilesystemPath(pathLabel)) {
        status += " — Enter a full path to auto-reload after page refresh.";
      }
      statusEl.textContent = status;
      enableControls(true);
      buildDashboard();
      if (savedConfig) applySavedConfig(savedConfig);
      else renderAll();
      updateFileLabel();
      persistCsvCache(text, pathLabel);
      persistToStorage();
    }

    function renderAll() {
      buildDataCaches();
      renderChartSafely();
      renderInspector();
      updateRowControls();
    }

    function destroyChart() {
      state.pickedPlotSeries = null;
      if (state.plot) {
        state.plot.destroy();
        state.plot = null;
      }
      chartHost.replaceChildren();
      chartLegend.replaceChildren();
    }

    function getXValues() {
      if (state.xValues) return state.xValues;
      return new Array(state.sampleCount).fill(0).map((_, i) => i);
    }

    function refreshFullXExtents() {
      const x = getXValues();
      if (x.length === 0) {
        state.xFullMin = null;
        state.xFullMax = null;
        return;
      }
      let min = Infinity;
      let max = -Infinity;
      for (let i = 0; i < x.length; i++) {
        if (x[i] < min) min = x[i];
        if (x[i] > max) max = x[i];
      }
      state.xFullMin = min;
      state.xFullMax = max;
    }

    function hasXZoom() {
      return state.xZoomMin != null && state.xZoomMax != null;
    }

    function updateXZoomUi() {
      if (!hasXZoom()) {
        xZoomReset.disabled = state.sampleCount === 0;
        xZoomHint.textContent = "";
        return;
      }
      xZoomReset.disabled = false;
      const lo = state.xZoomMin;
      const hi = state.xZoomMax;
      const fmt = (v) => (v >= 1000 ? `${(v / 1000).toFixed(2)}s` : `${v}ms`);
      xZoomHint.textContent = `X zoomed: ${fmt(lo)} – ${fmt(hi)}`;
    }

    function applyXZoomToPlot() {
      if (!state.plot || !hasXZoom()) return;
      state.plot.setScale("x", { min: state.xZoomMin, max: state.xZoomMax });
      applyYRangeToPlot();
    }

    function resetXZoom() {
      state.xZoomMin = null;
      state.xZoomMax = null;
      if (state.plot && state.xFullMin != null && state.xFullMax != null) {
        state.plot.setScale("x", { min: state.xFullMin, max: state.xFullMax });
        state.plot.setSelect({ left: 0, width: 0, top: 0, height: 0 }, false);
        if (hasYRangeLock()) applyYRangeToPlot();
        else {
          const ext = plottedValueExtents();
          if (ext) state.plot.setScale("y", { min: ext.min, max: ext.max });
        }
        syncPlotLayout();
      }
      updateXZoomUi();
      scheduleStorageSave();
    }

    function syncXZoomStateFromPlot(u) {
      const sc = u.scales.x;
      if (!sc || sc.min == null || sc.max == null) return;
      if (state.xFullMin == null || state.xFullMax == null) return;
      const span = state.xFullMax - state.xFullMin;
      const eps = Math.max(span * 0.0005, 1e-6);
      const zoomed = sc.min > state.xFullMin + eps || sc.max < state.xFullMax - eps;
      if (zoomed) {
        state.xZoomMin = sc.min;
        state.xZoomMax = sc.max;
      } else {
        state.xZoomMin = null;
        state.xZoomMax = null;
      }
      updateXZoomUi();
      scheduleStorageSave();
    }

    function plottedValueExtents() {
      const series = activeSeriesColumns();
      let start = 0;
      let end = state.sampleCount;
      if (!hasYRangeLock() && hasXZoom()) {
        const range = rowIndexRangeForXRange(state.xZoomMin, state.xZoomMax);
        start = range.start;
        end = range.end;
      }
      let min = Infinity;
      let max = -Infinity;
      for (const column of series) {
        const cached = state.seriesCache?.get(column);
        if (!cached) continue;
        for (let i = start; i < end; i++) {
          const n = cached[i];
          if (n == null || !Number.isFinite(n)) continue;
          if (n < min) min = n;
          if (n > max) max = n;
        }
      }
      if (!Number.isFinite(min) || !Number.isFinite(max)) return null;
      if (min === max) {
        const pad = Math.abs(min) * 0.05 || 1;
        return { min: min - pad, max: max + pad };
      }
      const pad = (max - min) * 0.02;
      return { min: min - pad, max: max + pad };
    }

    function parseAxisInput(el) {
      const raw = el.value.trim();
      if (raw === "") return null;
      const n = Number(raw);
      return Number.isFinite(n) ? n : null;
    }

    function readYRangeInputs() {
      return {
        ymin: parseAxisInput(yMinOverride),
        ymax: parseAxisInput(yMaxOverride),
      };
    }

    function hasYRangeLock() {
      return state.yMin != null || state.yMax != null;
    }

    function effectiveYRange() {
      const ext = plottedValueExtents();
      const dMin = ext ? ext.min : 0;
      const dMax = ext ? ext.max : 1;
      const lo = state.yMin != null ? state.yMin : dMin;
      const hi = state.yMax != null ? state.yMax : dMax;
      if (!Number.isFinite(lo) || !Number.isFinite(hi) || lo >= hi) return null;
      return [lo, hi];
    }

    function yRangeFn(_u, dataMin, dataMax) {
      if (hasYRangeLock()) {
        const locked = effectiveYRange();
        if (locked) return locked;
      }
      const lo = dataMin != null && Number.isFinite(dataMin) ? dataMin : 0;
      const hi = dataMax != null && Number.isFinite(dataMax) ? dataMax : lo + 1;
      return lo < hi ? [lo, hi] : [hi - 1, hi];
    }

    function yAutoFn() {
      return !hasYRangeLock();
    }

    function buildYScaleOpts() {
      const y = {
        auto: yAutoFn,
        range: yRangeFn,
      };
      if (state.logScale) y.distr = 3;
      return y;
    }

    function formatYAxisLabel(v) {
      if (v == null || !Number.isFinite(v)) return "";
      const abs = Math.abs(v);
      if (abs === 0) return "0";
      if (state.logScale) return v.toPrecision(3);
      if (abs >= 1e9) return (v / 1e9).toFixed(1) + "G";
      if (abs >= 1e6) return (v / 1e6).toFixed(1) + "M";
      if (abs >= 1e4) return (v / 1e3).toFixed(1) + "k";
      if (abs >= 100) return v.toFixed(0);
      if (abs >= 10) return v.toFixed(1);
      if (abs >= 1) return v.toFixed(2);
      return v.toPrecision(3);
    }

    function chartDimensions() {
      return {
        w: Math.max(chartHost.clientWidth || chartWrap.clientWidth, 320),
        h: Math.max(chartHost.clientHeight || chartWrap.clientHeight, 160),
      };
    }

    function syncPlotLayout() {
      if (!state.plot) return;
      const { w, h } = chartDimensions();
      state.plot.setSize({ width: w, height: h });
    }

    function buildYAxisOpts() {
      return {
        stroke: "#8b93a1",
        grid: { stroke: "#2a2f38" },
        values: (_u, vals) => vals.map(formatYAxisLabel),
        gap: 8,
      };
    }

    function applyYRangeToPlot() {
      if (!state.plot || !hasYRangeLock()) return;
      const r = effectiveYRange();
      if (!r) return;
      const y = state.plot.scales.y;
      y.auto = yAutoFn;
      y.range = yRangeFn;
      state.plot.setScale("y", { min: r[0], max: r[1] });
      syncPlotLayout();
    }

    function formatYRangeHint() {
      const r = effectiveYRange();
      if (!r) return "Invalid Y range.";
      return `Y axis locked: ${r[0]} … ${r[1]}`;
    }

    function applyYRangeFromInputs() {
      const { ymin, ymax } = readYRangeInputs();
      if (ymin == null && ymax == null) {
        yRangeHint.textContent = "Enter Y min and/or Y max.";
        return false;
      }
      if (ymin != null && ymax != null && ymin >= ymax) {
        yRangeHint.textContent = "Y min must be less than Y max.";
        return false;
      }
      if (state.logScale && ymin != null && ymin <= 0) {
        yRangeHint.textContent = "Log scale requires Y min > 0.";
        return false;
      }
      state.yMin = ymin;
      state.yMax = ymax;
      const r = effectiveYRange();
      if (!r) {
        yRangeHint.textContent = "Could not resolve Y range for current series.";
        return false;
      }
      if (state.logScale && r[0] <= 0) {
        yRangeHint.textContent = "Log scale requires Y min > 0.";
        return false;
      }
      if (state.plot && activeSeriesColumns().length > 0) {
        applyYRangeToPlot();
      } else {
        renderChartSafely();
      }
      yRangeHint.textContent = formatYRangeHint();
      scheduleStorageSave();
      return true;
    }

    function clearYRangeOverride() {
      state.yMin = null;
      state.yMax = null;
      yMinOverride.value = "";
      yMaxOverride.value = "";
      yRangeHint.textContent = "Y axis auto-scales to data.";
      renderChartSafely();
      scheduleStorageSave();
    }

    function updateChartSeriesHint(plotSi, hover) {
      if (!state.plot) return;
      if (plotSi != null && plotSi > 0) {
        const name = state.plot.series[plotSi].label || seriesLabel(state.chartSeriesCols[plotSi - 1]);
        chartSeriesHint.textContent = hover ? `Nearest: ${name}` : `Series: ${name}`;
        return;
      }
      if (!state.pickedPlotSeries) {
        chartSeriesHint.textContent = "Click a line to identify";
      }
    }

    function updateLegendPick(plotSi) {
      chartLegend.querySelectorAll(".legend-item").forEach((el) => {
        const si = Number(el.dataset.si);
        el.classList.toggle("picked", plotSi != null && si + 1 === plotSi);
      });
    }

    function applySeriesPick(u, plotSi) {
      state.pickedPlotSeries = plotSi;
      for (let i = 1; i < u.series.length; i++) {
        const on = i === plotSi;
        u.setSeries(i, { width: on ? 3 : 1 }, false);
      }
      updateChartSeriesHint(plotSi, false);
      updateLegendPick(plotSi);
    }

    function clearSeriesPick() {
      state.pickedPlotSeries = null;
      const u = state.plot;
      if (u) {
        for (let i = 1; i < u.series.length; i++) {
          u.setSeries(i, { width: 2 }, false);
        }
      }
      chartSeriesHint.textContent = "Click a line to identify";
      updateLegendPick(null);
    }

    function pickNearestSeries(u, left, top) {
      u.setCursor({ left, top }, true);
      const idx = u.cursor.idx;
      if (idx == null || idx < 0) return;
      let bestPlotSi = null;
      let bestDist = Infinity;
      for (let si = 1; si < u.series.length; si++) {
        const val = u.data[si][idx];
        if (val == null || !Number.isFinite(val)) continue;
        const yPx = u.valToPos(val, "y", true);
        const dist = Math.abs(yPx - top);
        if (dist < bestDist) {
          bestDist = dist;
          bestPlotSi = si;
        }
      }
      if (bestPlotSi == null || bestDist > 28) {
        clearSeriesPick();
        return;
      }
      if (state.pickedPlotSeries === bestPlotSi) {
        clearSeriesPick();
        return;
      }
      applySeriesPick(u, bestPlotSi);
    }

    function bindChartSeriesPick(u) {
      if (u.over.dataset.seriesPickBound) return;
      u.over.dataset.seriesPickBound = "1";
      u.over.addEventListener("mouseup", () => {
        if (state.plot !== u) return;
        if (u.select.width >= 8) return;
        pickNearestSeries(u, u.cursor.left, u.cursor.top);
      });
    }

    function renderChartLegend(series) {
      chartLegend.replaceChildren();
      series.forEach((column, si) => {
        const item = document.createElement("span");
        item.className = "legend-item";
        if (state.pickedPlotSeries === si + 1) item.classList.add("picked");
        item.dataset.si = String(si);
        const sw = document.createElement("span");
        sw.className = "legend-swatch";
        sw.style.background = CHART_COLORS[si % CHART_COLORS.length];
        const label = document.createElement("span");
        label.textContent = seriesLabel(column);
        item.append(sw, label);
        item.addEventListener("click", () => {
          if (!state.plot) return;
          const plotSi = si + 1;
          if (state.pickedPlotSeries === plotSi) clearSeriesPick();
          else applySeriesPick(state.plot, plotSi);
        });
        chartLegend.appendChild(item);
      });
    }

    function renderChart() {
      if (state.sampleCount === 0) {
        destroyChart();
        chartEmpty.hidden = false;
        chartEmpty.textContent = "Load a Piper telemetry log and enable metrics to graph.";
        return;
      }
      const series = activeSeriesColumns();
      const hasSeries = series.length > 0;
      if (!hasSeries) {
        destroyChart();
        chartEmpty.hidden = false;
        chartEmpty.textContent =
          "Select numeric columns in the sidebar to plot (e.g. busy_ratio, link lengths).";
        return;
      }
      if (typeof uPlot === "undefined") {
        destroyChart();
        chartEmpty.hidden = false;
        chartEmpty.textContent = "Chart library unavailable.";
        return;
      }

      chartEmpty.hidden = true;
      const data = buildChartData(series);
      const yLocked = hasYRangeLock();
      const canReuse =
        state.plot &&
        seriesColsEqual(series, state.chartSeriesCols) &&
        state.chartLogScale === state.logScale &&
        state.chartYLocked === yLocked;

      if (canReuse) {
        state.plot.setData(data);
        if (hasXZoom()) applyXZoomToPlot();
        else if (state.xFullMin != null && state.xFullMax != null) {
          state.plot.setScale("x", { min: state.xFullMin, max: state.xFullMax });
        }
        if (hasYRangeLock()) applyYRangeToPlot();
        else {
          const ext = plottedValueExtents();
          if (ext) state.plot.setScale("y", { min: ext.min, max: ext.max });
        }
        syncPlotLayout();
        syncChartCursor();
        updateXZoomUi();
        return;
      }

      destroyChart();
      state.chartSeriesCols = series.slice();
      state.chartLogScale = state.logScale;
      state.chartYLocked = yLocked;
      state.pickedPlotSeries = null;
      chartSeriesHint.textContent = "Click a line to identify";

      const seriesOpts = [{}];
      series.forEach((column, si) => {
        seriesOpts.push({
          label: seriesLabel(column),
          stroke: CHART_COLORS[si % CHART_COLORS.length],
          width: 2,
          auto: !yLocked,
        });
      });

      const { w, h } = chartDimensions();
      const scales = {
        x: { time: false },
        y: buildYScaleOpts(),
      };
      const opts = {
        width: w,
        height: h,
        series: seriesOpts,
        scales,
        axes: [
          {
            stroke: "#8b93a1",
            grid: { stroke: "#2a2f38" },
            values: (_u, vals) =>
              vals.map((v) => (v >= 1000 ? `${(v / 1000).toFixed(1)}s` : `${v}ms`)),
          },
          buildYAxisOpts(),
        ],
        select: {
          show: true,
          over: true,
          fill: "rgba(126, 184, 255, 0.14)",
          stroke: "rgba(126, 184, 255, 0.55)",
        },
        cursor: {
          drag: { x: true, y: false, setScale: true },
          focus: { prox: 24 },
          points: { size: 5, stroke: "#d8dce3", fill: "#14161a" },
        },
        hooks: {
          ready: [
            (u) => {
              bindChartSeriesPick(u);
              if (hasXZoom()) applyXZoomToPlot();
              else if (state.xFullMin != null && state.xFullMax != null) {
                u.setScale("x", { min: state.xFullMin, max: state.xFullMax });
              }
              if (hasYRangeLock()) applyYRangeToPlot();
              syncXZoomStateFromPlot(u);
            },
          ],
          setSeries: [
            (u, plotSi, opts) => {
              if (opts.focus == null || state.pickedPlotSeries != null) return;
              if (plotSi > 0) updateChartSeriesHint(plotSi, true);
              else if (!state.pickedPlotSeries) chartSeriesHint.textContent = "Click a line to identify";
            },
          ],
          setScale: [
            (u, key) => {
              if (key !== "x") return;
              syncXZoomStateFromPlot(u);
              if (hasYRangeLock()) applyYRangeToPlot();
              else {
                const ext = plottedValueExtents();
                if (ext) u.setScale("y", { min: ext.min, max: ext.max });
                syncPlotLayout();
              }
            },
          ],
          setCursor: [
            (u) => {
              if (state.syncingCursor) return;
              const idx = u.cursor.idx;
              if (idx == null || idx < 0 || idx === state.selectedRowIndex) return;
              const prev = state.selectedRowIndex;
              state.selectedRowIndex = idx;
              rowSlider.value = String(idx);
              updateRowControls();
              renderInspector();
              scheduleStorageSave();
            },
          ],
        },
      };

      refreshFullXExtents();
      state.plot = new uPlot(opts, data, chartHost);
      requestAnimationFrame(() => {
        if (state.plot) syncPlotLayout();
      });
      if (hasXZoom()) applyXZoomToPlot();
      if (yLocked) {
        applyYRangeToPlot();
        requestAnimationFrame(() => {
          if (state.plot && hasYRangeLock()) applyYRangeToPlot();
        });
      }
      renderChartLegend(series);
      syncChartCursor();
      updateXZoomUi();
    }

    function renderChartSafely() {
      try {
        renderChart();
      } catch (error) {
        console.error("Piper CSV chart render failed", error);
        destroyChart();
        chartEmpty.hidden = false;
        const message = error?.message || String(error);
        chartEmpty.textContent = `Chart unavailable: ${message}.`;
      }
    }

    function resizeChart() {
      if (!state.plot) return;
      syncPlotLayout();
      if (hasXZoom()) applyXZoomToPlot();
      if (hasYRangeLock()) applyYRangeToPlot();
    }

    function syncChartCursor() {
      if (!state.plot || state.selectedRowIndex < 0) return;
      state.syncingCursor = true;
      state.plot.setCursor({ idx: state.selectedRowIndex }, true);
      state.syncingCursor = false;
    }

    function enableControls(on) {
      const hasRows = on && state.sampleCount > 0;
      rowSlider.disabled = !hasRows;
      prevRow.disabled = !hasRows;
      nextRow.disabled = !hasRows;
      if (hasRows) {
        rowSlider.max = String(state.sampleCount - 1);
        rowSlider.value = String(Math.max(0, state.selectedRowIndex));
      }
      inspectorPanel.hidden = !on || state.sampleCount === 0;
      chartSection.hidden = !on;
      yMinOverride.disabled = !on;
      yMaxOverride.disabled = !on;
      yRangeFromData.disabled = !on;
      yRangeApply.disabled = !on;
      yRangeAuto.disabled = !on;
      xZoomReset.disabled = !on || !hasXZoom();
      if (!on) xZoomHint.textContent = "";
    }

    function inspectorColumns() {
      const columns = new Set(["elapsed_ms"]);
      for (const column of activeSeriesColumns()) columns.add(column);
      if (state.focusedObjectIds.size > 0) {
        for (const [column, metric] of state.metricsByColumn.entries()) {
          if (state.focusedObjectIds.has(metric.object_id)) columns.add(column);
        }
      }
      return [...columns];
    }

    function renderInspector() {
      inspectorGrid.replaceChildren();
      if (state.selectedRowIndex < 0 || state.sampleCount === 0) return;
      const ri = state.selectedRowIndex;
      const elapsed = state.columnData.get("elapsed_ms")?.values?.[ri];
      inspectorTitle.textContent = elapsed != null
        ? `Sample ${ri + 1} of ${state.sampleCount} · ${elapsed} ms`
        : `Sample ${ri + 1} of ${state.sampleCount}`;
      for (const column of inspectorColumns()) {
        const col = state.columnData.get(column);
        if (!col) continue;
        const pair = document.createElement("div");
        pair.className = "detail-pair";
        const dt = document.createElement("dt");
        dt.textContent = seriesLabel(column);
        const dd = document.createElement("dd");
        const value = col.values[ri];
        dd.textContent = value == null ? "" : String(value);
        pair.append(dt, dd);
        inspectorGrid.appendChild(pair);
      }
    }

    function selectRow(index, opts = {}) {
      if (index < 0 || index >= state.sampleCount) return;
      state.selectedRowIndex = index;
      rowSlider.value = String(index);
      updateRowControls();
      renderInspector();
      if (!opts.fromChart) syncChartCursor();
      scheduleStorageSave();
    }

    function updateRowControls() {
      const n = state.sampleCount;
      if (n === 0) {
        rowLabel.textContent = "—";
        return;
      }
      const i = state.selectedRowIndex;
      const elapsed = state.columnData.get("elapsed_ms")?.values?.[i];
      rowLabel.textContent = elapsed != null ? `Sample ${i + 1} · ${elapsed} ms` : `Sample ${i + 1} / ${n}`;
      prevRow.disabled = i <= 0;
      nextRow.disabled = i >= n - 1;
    }

    function loadCsvFromFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        state.csvPath = file.name;
        csvPathInput.value = file.name;
        loadCsvText(reader.result, file.name);
      };
      reader.readAsText(file);
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files?.[0];
      if (!file) {
        updateFileLabel();
        return;
      }
      loadCsvFromFile(file);
    });

    csvPathLoad.addEventListener("click", () => {
      loadCsvFromPath(csvPathInput.value, null);
    });

    clearSaved.addEventListener("click", () => {
      try {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(CSV_CACHE_KEY);
      } catch (_) {}
      state.csvPath = null;
      csvPathInput.value = "";
      updateFileLabel();
      statusEl.textContent = "Saved CSV path and cache cleared.";
    });

    csvPathInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") csvPathLoad.click();
    });

    document.body.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropHint.classList.add("drag-over");
    });
    document.body.addEventListener("dragleave", () => {
      dropHint.classList.remove("drag-over");
    });
    document.body.addEventListener("drop", (e) => {
      e.preventDefault();
      dropHint.classList.remove("drag-over");
      const file = e.dataTransfer?.files?.[0];
      if (!file) return;
      loadCsvFromFile(file);
    });

    logScaleEl.addEventListener("change", () => {
      state.logScale = logScaleEl.checked;
      if (state.logScale && state.yMin != null && state.yMin <= 0) {
        state.yMin = null;
        state.yMax = null;
        yRangeHint.textContent = "Y override cleared (log needs min > 0).";
      }
      renderChartSafely();
      scheduleStorageSave();
    });

    yRangeFromData.addEventListener("click", () => {
      const ext = plottedValueExtents();
      if (!ext) {
        yRangeHint.textContent = "No numeric series selected.";
        return;
      }
      yMinOverride.value = String(ext.min);
      yMaxOverride.value = String(ext.max);
      yRangeHint.textContent = "Adjust limits, then Apply.";
    });

    yRangeApply.addEventListener("click", () => applyYRangeFromInputs());

    yRangeAuto.addEventListener("click", () => clearYRangeOverride());

    xZoomReset.addEventListener("click", () => resetXZoom());

    [yMinOverride, yMaxOverride].forEach((el) => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") applyYRangeFromInputs();
      });
    });

    let resizeDebounce = null;
    const resizeObserver = new ResizeObserver(() => {
      clearTimeout(resizeDebounce);
      resizeDebounce = setTimeout(resizeChart, 80);
    });
    resizeObserver.observe(chartWrap);

    rowSlider.addEventListener("input", () => {
      selectRow(Number(rowSlider.value));
    });
    prevRow.addEventListener("click", () => selectRow(state.selectedRowIndex - 1));
    nextRow.addEventListener("click", () => selectRow(state.selectedRowIndex + 1));

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && state.pickedPlotSeries) clearSeriesPick();
    });

    document.addEventListener("keydown", (e) => {
      if (state.sampleCount === 0) return;
      if (e.key === "ArrowDown") {
        e.preventDefault();
        selectRow(Math.min(state.selectedRowIndex + 1, state.sampleCount - 1));
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        selectRow(Math.max(state.selectedRowIndex - 1, 0));
      }
    });

    function initFromStorage() {
      const saved = loadSavedState();
      if (!saved) return;
      if (saved.csvPath) {
        state.csvPath = saved.csvPath;
        csvPathInput.value = saved.csvPath;
        loadCsvFromPath(saved.csvPath, saved.config || null, { legacySaved: saved });
        return;
      }
      if (saved.csvText) {
        loadCsvText(saved.csvText, saved.csvPath || "saved.csv", saved.config || null);
      }
    }

    initFromStorage();
  </script>
</body>
</html>
