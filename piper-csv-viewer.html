<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piper CSV Viewer</title>
  <!-- Local: use file picker. Served: python -m http.server from repo root, then
       piper-csv-viewer.html (example CSV embedded). Optional: ?csv=other.csv when served -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 13px;
      background: #14161a;
      color: #d8dce3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
      padding: 10px 14px;
      border-bottom: 1px solid #2a2f38;
      background: #1a1d23;
      flex-shrink: 0;
    }
    .toolbar label { color: #8b93a1; }
    .toolbar input[type="file"] { max-width: 220px; }
    .toolbar input[type="range"] { width: 140px; }
    .toolbar button {
      background: #2a3140;
      border: 1px solid #3d4656;
      color: #d8dce3;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #354052; }
    .drop-hint {
      color: #6b7280;
      font-size: 12px;
    }
    .drop-hint.drag-over { color: #7eb8ff; }
    .row-label { min-width: 72px; font-variant-numeric: tabular-nums; }
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid #2a2f38;
      display: flex;
      flex-direction: column;
      background: #181b21;
    }
    .sidebar-head {
      padding: 10px;
      border-bottom: 1px solid #2a2f38;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sidebar-head input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #3d4656;
      border-radius: 4px;
      background: #14161a;
      color: #d8dce3;
    }
    .sidebar-actions { display: flex; gap: 6px; }
    .sidebar-actions button {
      flex: 1;
      font-size: 11px;
      padding: 4px 6px;
      background: #2a3140;
      border: 1px solid #3d4656;
      color: #d8dce3;
      border-radius: 4px;
      cursor: pointer;
    }
    .sidebar-actions button:hover { background: #354052; }
    .column-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .column-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      cursor: pointer;
      user-select: none;
    }
    .column-item:hover { background: #22262e; }
    .column-item.hidden-filter { display: none; }
    .column-item input { margin: 0; cursor: pointer; }
    .column-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .chart-section {
      flex: 3;
      display: flex;
      flex-direction: column;
      min-height: 200px;
      border-bottom: 1px solid #2a2f38;
      background: #14161a;
    }
    .chart-head {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 6px 14px;
      flex-shrink: 0;
      color: #8b93a1;
      font-size: 12px;
    }
    .chart-head label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .chart-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      padding: 0 8px 4px;
    }
    .chart-wrap .uplot {
      font-family: inherit;
    }
    .chart-wrap .u-legend { display: none; }
    #chartHost { width: 100%; height: 100%; }
    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      padding: 4px 14px 8px;
      flex-shrink: 0;
      max-height: 56px;
      overflow-y: auto;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #8b93a1;
    }
    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .table-section {
      flex: 2;
      display: flex;
      flex-direction: column;
      min-height: 140px;
    }
    .table-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
    }
    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #1f2430;
      border-bottom: 2px solid #3d4656;
      padding: 6px 10px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    tbody td {
      padding: 4px 10px;
      border-bottom: 1px solid #232830;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #1e232c; }
    tbody tr.selected { background: #253045; }
    tbody tr.selected td { border-bottom-color: #354052; }
    .detail {
      flex-shrink: 0;
      max-height: 120px;
      overflow: auto;
      border-top: 1px solid #2a2f38;
      background: #181b21;
      padding: 10px 14px;
    }
    .detail h3 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 600;
      color: #8b93a1;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 4px 16px;
    }
    .detail-pair {
      display: flex;
      gap: 8px;
      font-size: 12px;
      min-width: 0;
    }
    .detail-pair dt {
      margin: 0;
      color: #7eb8ff;
      flex-shrink: 0;
      max-width: 50%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .detail-pair dd {
      margin: 0;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .empty-state {
      padding: 24px;
      color: #6b7280;
      text-align: center;
    }
    .status { color: #8b93a1; font-size: 12px; }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <input type="file" id="fileInput" accept=".csv,text/csv">
    <span class="drop-hint" id="dropHint">Drop CSV or pick file to replace embedded example</span>
    <label><input type="checkbox" id="logScale"> Log Y</label>
    <label><input type="checkbox" id="showAllRows" checked> Show all rows</label>
    <button type="button" id="prevRow" disabled>&larr;</button>
    <input type="range" id="rowSlider" min="0" max="0" value="0" disabled>
    <button type="button" id="nextRow" disabled>&rarr;</button>
    <span class="row-label" id="rowLabel">—</span>
    <span class="status" id="status"></span>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <input type="search" id="columnSearch" placeholder="Filter columns…" disabled>
        <div class="sidebar-actions">
          <button type="button" id="selectAll" disabled>All</button>
          <button type="button" id="selectNone" disabled>None</button>
        </div>
      </div>
      <div class="column-list" id="columnList"></div>
    </aside>
    <div class="main">
      <section class="chart-section" id="chartSection">
        <div class="chart-head">
          <span>Graph — X: elapsed_ms · check columns in sidebar to plot</span>
        </div>
        <div class="chart-wrap" id="chartWrap">
          <p class="empty-state" id="chartEmpty">Load CSV and select numeric columns to graph.</p>
          <div id="chartHost"></div>
        </div>
        <div class="chart-legend" id="chartLegend"></div>
      </section>
      <div class="table-section">
        <div class="table-wrap" id="tableWrap" tabindex="0">
          <p class="empty-state" id="emptyState">Load a Piper CSV to begin.</p>
          <table id="dataTable" hidden>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <section class="detail" id="detailPanel" hidden>
          <h3 id="detailTitle">Row detail</h3>
          <dl class="detail-grid" id="detailGrid"></dl>
        </section>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
  <script>
    const CHART_COLORS = [
      "#7eb8ff", "#f59e0b", "#34d399", "#f472b6", "#a78bfa",
      "#fb7185", "#38bdf8", "#fbbf24", "#4ade80", "#c084fc",
    ];

    const state = {
      headers: [],
      rows: [],
      visible: [],
      selectedRowIndex: 0,
      showAllRows: true,
      searchQuery: "",
      logScale: false,
      plot: null,
      syncingCursor: false,
    };

    const fileInput = document.getElementById("fileInput");
    const dropHint = document.getElementById("dropHint");
    const logScaleEl = document.getElementById("logScale");
    const showAllRowsEl = document.getElementById("showAllRows");
    const chartWrap = document.getElementById("chartWrap");
    const chartHost = document.getElementById("chartHost");
    const chartEmpty = document.getElementById("chartEmpty");
    const chartLegend = document.getElementById("chartLegend");
    const chartSection = document.getElementById("chartSection");
    const rowSlider = document.getElementById("rowSlider");
    const prevRow = document.getElementById("prevRow");
    const nextRow = document.getElementById("nextRow");
    const rowLabel = document.getElementById("rowLabel");
    const statusEl = document.getElementById("status");
    const columnSearch = document.getElementById("columnSearch");
    const selectAllBtn = document.getElementById("selectAll");
    const selectNoneBtn = document.getElementById("selectNone");
    const columnList = document.getElementById("columnList");
    const tableWrap = document.getElementById("tableWrap");
    const emptyState = document.getElementById("emptyState");
    const dataTable = document.getElementById("dataTable");
    const tableHead = document.getElementById("tableHead");
    const tableBody = document.getElementById("tableBody");
    const detailPanel = document.getElementById("detailPanel");
    const detailTitle = document.getElementById("detailTitle");
    const detailGrid = document.getElementById("detailGrid");

    function parseCsvLine(line) {
      const fields = [];
      let i = 0;
      let field = "";
      while (i < line.length) {
        if (line[i] === '"') {
          i += 1;
          while (i < line.length) {
            if (line[i] === '"') {
              if (line[i + 1] === '"') {
                field += '"';
                i += 2;
              } else {
                i += 1;
                break;
              }
            } else {
              field += line[i];
              i += 1;
            }
          }
          if (line[i] === ",") i += 1;
        } else {
          while (i < line.length && line[i] !== ",") {
            field += line[i];
            i += 1;
          }
          if (line[i] === ",") i += 1;
        }
        fields.push(field);
        field = "";
      }
      return fields;
    }

    function parseCsv(text) {
      const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
      const nonEmpty = lines.filter((l) => l.length > 0);
      if (nonEmpty.length === 0) return { headers: [], rows: [] };
      const headers = parseCsvLine(nonEmpty[0]);
      const colCount = headers.length;
      const rows = [];
      for (let r = 1; r < nonEmpty.length; r++) {
        const cells = parseCsvLine(nonEmpty[r]);
        while (cells.length < colCount) cells.push("");
        if (cells.length > colCount) cells.length = colCount;
        rows.push(cells);
      }
      return { headers, rows };
    }

    function isNumericColumn(ci) {
      const name = state.headers[ci];
      if (name === "elapsed_ms") return false;
      if (/_name$|_state$|_scaling_state$|_probe_state$|_outcome$/.test(name)) return false;
      if (/^(shutdown_requested|abort_requested|pending_scale_operation|anchor_name)$/.test(name)) return false;
      if (/^stage\d+_is_anchor$/.test(name)) return false;
      for (const row of state.rows) {
        const n = Number(row[ci]);
        if (Number.isFinite(n)) return true;
      }
      return false;
    }

    function defaultVisible() {
      const picked = state.headers.map((_, i) => isNumericColumn(i));
      if (picked.some(Boolean)) return picked;
      return state.headers.map(() => true);
    }

    function loadCsvText(text, name) {
      const { headers, rows } = parseCsv(text);
      state.headers = headers;
      state.rows = rows;
      state.visible = defaultVisible();
      state.selectedRowIndex = rows.length > 0 ? 0 : -1;
      statusEl.textContent = `${name}: ${rows.length} rows, ${headers.length} columns`;
      enableControls(true);
      buildColumnList();
      renderAll();
    }

    function renderAll() {
      renderChart();
      renderTable();
      renderDetail();
      updateRowControls();
    }

    function destroyChart() {
      if (state.plot) {
        state.plot.destroy();
        state.plot = null;
      }
      chartHost.replaceChildren();
      chartLegend.replaceChildren();
    }

    function xAxisIndex() {
      return state.headers.indexOf("elapsed_ms");
    }

    function getXValues() {
      const xi = xAxisIndex();
      if (xi >= 0) {
        return state.rows.map((r) => Number(r[xi]));
      }
      return state.rows.map((_, i) => i);
    }

    function chartSeriesIndices() {
      const xi = xAxisIndex();
      return visibleColumnIndices().filter((ci) => ci !== xi && isNumericColumn(ci));
    }

    function renderChartLegend(series) {
      chartLegend.replaceChildren();
      series.forEach((ci, si) => {
        const item = document.createElement("span");
        item.className = "legend-item";
        const sw = document.createElement("span");
        sw.className = "legend-swatch";
        sw.style.background = CHART_COLORS[si % CHART_COLORS.length];
        const label = document.createElement("span");
        label.textContent = state.headers[ci];
        item.append(sw, label);
        chartLegend.appendChild(item);
      });
    }

    function renderChart() {
      destroyChart();
      if (state.rows.length === 0) {
        chartEmpty.hidden = false;
        chartEmpty.textContent = "Load CSV and select numeric columns to graph.";
        return;
      }
      const series = chartSeriesIndices();
      const hasSeries = series.length > 0;
      chartEmpty.hidden = hasSeries;
      chartEmpty.textContent = hasSeries
        ? ""
        : "Select numeric columns in the sidebar to plot (e.g. busy_ratio, link lengths).";
      if (!hasSeries) return;

      const x = getXValues();
      const data = [x];
      const seriesOpts = [{}];
      series.forEach((ci, si) => {
        data.push(
          state.rows.map((r) => {
            const n = Number(r[ci]);
            return Number.isFinite(n) ? n : null;
          })
        );
        seriesOpts.push({
          label: state.headers[ci],
          stroke: CHART_COLORS[si % CHART_COLORS.length],
          width: 2,
        });
      });

      const w = Math.max(chartWrap.clientWidth - 16, 320);
      const h = Math.max(chartWrap.clientHeight - 8, 160);
      const opts = {
        width: w,
        height: h,
        series: seriesOpts,
        scales: state.logScale ? { y: { distr: 3 } } : {},
        axes: [
          {
            stroke: "#8b93a1",
            grid: { stroke: "#2a2f38" },
            values: (_u, vals) =>
              vals.map((v) => (v >= 1000 ? `${(v / 1000).toFixed(1)}s` : `${v}ms`)),
          },
          {
            stroke: "#8b93a1",
            grid: { stroke: "#2a2f38" },
          },
        ],
        cursor: {
          drag: { x: false, y: false },
          points: { size: 5, stroke: "#d8dce3", fill: "#14161a" },
        },
        hooks: {
          setCursor: [
            (u) => {
              if (state.syncingCursor) return;
              const idx = u.cursor.idx;
              if (idx != null && idx >= 0 && idx !== state.selectedRowIndex) {
                selectRow(idx, { fromChart: true });
              }
            },
          ],
        },
      };

      state.plot = new uPlot(opts, data, chartHost);
      renderChartLegend(series);
      syncChartCursor();
    }

    function syncChartCursor() {
      if (!state.plot || state.selectedRowIndex < 0) return;
      state.syncingCursor = true;
      state.plot.setCursor({ idx: state.selectedRowIndex }, true);
      state.syncingCursor = false;
    }

    function enableControls(on) {
      columnSearch.disabled = !on;
      selectAllBtn.disabled = !on;
      selectNoneBtn.disabled = !on;
      const hasRows = on && state.rows.length > 0;
      rowSlider.disabled = !hasRows;
      prevRow.disabled = !hasRows;
      nextRow.disabled = !hasRows;
      if (hasRows) {
        rowSlider.max = String(state.rows.length - 1);
        rowSlider.value = String(Math.max(0, state.selectedRowIndex));
      }
      emptyState.hidden = on;
      dataTable.hidden = !on;
      detailPanel.hidden = !on || state.rows.length === 0;
      chartSection.hidden = !on;
    }

    function visibleColumnIndices() {
      const out = [];
      for (let i = 0; i < state.headers.length; i++) {
        if (state.visible[i]) out.push(i);
      }
      return out;
    }

    function buildColumnList() {
      columnList.replaceChildren();
      state.headers.forEach((name, i) => {
        const item = document.createElement("label");
        item.className = "column-item";
        item.dataset.index = String(i);
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = state.visible[i];
        if (!isNumericColumn(i)) item.style.opacity = "0.55";
        cb.addEventListener("change", () => {
          state.visible[i] = cb.checked;
          renderAll();
        });
        const span = document.createElement("span");
        span.textContent = name;
        item.append(cb, span);
        item.addEventListener("click", (e) => {
          if (e.target === cb) return;
          cb.checked = !cb.checked;
          state.visible[i] = cb.checked;
          renderAll();
        });
        columnList.appendChild(item);
      });
      applyColumnFilter();
    }

    let filterDebounce = null;
    function applyColumnFilter() {
      const q = state.searchQuery.toLowerCase();
      columnList.querySelectorAll(".column-item").forEach((el) => {
        const i = Number(el.dataset.index);
        const name = state.headers[i] || "";
        el.classList.toggle("hidden-filter", q.length > 0 && !name.toLowerCase().includes(q));
      });
    }

    function renderTable() {
      const cols = visibleColumnIndices();
      tableHead.replaceChildren();
      tableBody.replaceChildren();
      if (cols.length === 0) {
        const tr = document.createElement("tr");
        const th = document.createElement("th");
        th.textContent = "Select at least one column";
        tr.appendChild(th);
        tableHead.appendChild(tr);
        return;
      }
      const headRow = document.createElement("tr");
      for (const ci of cols) {
        const th = document.createElement("th");
        th.textContent = state.headers[ci];
        headRow.appendChild(th);
      }
      tableHead.appendChild(headRow);

      const rowsToShow = state.showAllRows
        ? state.rows.map((_, i) => i)
        : state.selectedRowIndex >= 0
          ? [state.selectedRowIndex]
          : [];

      for (const ri of rowsToShow) {
        const tr = document.createElement("tr");
        if (ri === state.selectedRowIndex) tr.classList.add("selected");
        tr.dataset.rowIndex = String(ri);
        for (const ci of cols) {
          const td = document.createElement("td");
          td.textContent = state.rows[ri][ci] ?? "";
          tr.appendChild(td);
        }
        tr.addEventListener("click", () => selectRow(ri));
        tableBody.appendChild(tr);
      }
    }

    function renderDetail() {
      detailGrid.replaceChildren();
      if (state.selectedRowIndex < 0 || state.rows.length === 0) return;
      const ri = state.selectedRowIndex;
      detailTitle.textContent = `Row ${ri + 1} of ${state.rows.length}`;
      const cols = visibleColumnIndices();
      for (const ci of cols) {
        const pair = document.createElement("div");
        pair.className = "detail-pair";
        const dt = document.createElement("dt");
        dt.textContent = state.headers[ci];
        const dd = document.createElement("dd");
        dd.textContent = state.rows[ri][ci] ?? "";
        pair.append(dt, dd);
        detailGrid.appendChild(pair);
      }
    }

    function selectRow(index, opts = {}) {
      if (index < 0 || index >= state.rows.length) return;
      state.selectedRowIndex = index;
      rowSlider.value = String(index);
      updateRowControls();
      renderTable();
      renderDetail();
      if (!opts.fromChart) syncChartCursor();
      const row = tableBody.querySelector(`tr[data-row-index="${index}"]`);
      if (row) row.scrollIntoView({ block: "nearest" });
    }

    function updateRowControls() {
      const n = state.rows.length;
      if (n === 0) {
        rowLabel.textContent = "—";
        return;
      }
      const i = state.selectedRowIndex;
      const elapsed = state.headers.indexOf("elapsed_ms");
      const ms = elapsed >= 0 ? state.rows[i][elapsed] : "";
      rowLabel.textContent = ms ? `Row ${i + 1} · ${ms} ms` : `Row ${i + 1} / ${n}`;
      prevRow.disabled = i <= 0;
      nextRow.disabled = i >= n - 1;
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => loadCsvText(reader.result, file.name);
      reader.readAsText(file);
    });

    document.body.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropHint.classList.add("drag-over");
    });
    document.body.addEventListener("dragleave", () => {
      dropHint.classList.remove("drag-over");
    });
    document.body.addEventListener("drop", (e) => {
      e.preventDefault();
      dropHint.classList.remove("drag-over");
      const file = e.dataTransfer?.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => loadCsvText(reader.result, file.name);
      reader.readAsText(file);
    });

    logScaleEl.addEventListener("change", () => {
      state.logScale = logScaleEl.checked;
      renderChart();
    });

    showAllRowsEl.addEventListener("change", () => {
      state.showAllRows = showAllRowsEl.checked;
      renderTable();
    });

    let resizeDebounce = null;
    const resizeObserver = new ResizeObserver(() => {
      clearTimeout(resizeDebounce);
      resizeDebounce = setTimeout(() => {
        if (state.plot) renderChart();
      }, 80);
    });
    resizeObserver.observe(chartWrap);

    rowSlider.addEventListener("input", () => {
      selectRow(Number(rowSlider.value));
    });
    prevRow.addEventListener("click", () => selectRow(state.selectedRowIndex - 1));
    nextRow.addEventListener("click", () => selectRow(state.selectedRowIndex + 1));

    columnSearch.addEventListener("input", () => {
      state.searchQuery = columnSearch.value;
      clearTimeout(filterDebounce);
      filterDebounce = setTimeout(applyColumnFilter, 100);
    });

    selectAllBtn.addEventListener("click", () => {
      state.visible = state.headers.map(() => true);
      columnList.querySelectorAll('input[type="checkbox"]').forEach((cb) => { cb.checked = true; });
      renderAll();
    });
    selectNoneBtn.addEventListener("click", () => {
      state.visible = state.headers.map(() => false);
      columnList.querySelectorAll('input[type="checkbox"]').forEach((cb) => { cb.checked = false; });
      renderAll();
    });

    tableWrap.addEventListener("keydown", (e) => {
      if (state.rows.length === 0) return;
      if (e.key === "ArrowDown") {
        e.preventDefault();
        selectRow(Math.min(state.selectedRowIndex + 1, state.rows.length - 1));
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        selectRow(Math.max(state.selectedRowIndex - 1, 0));
      }
    });

    function loadEmbeddedCsv() {
      const el = document.getElementById("embeddedCsv");
      if (!el || !el.textContent.trim()) return;
      loadCsvText(el.textContent, "piper_1779306281518.csv");
    }

    const params = new URLSearchParams(location.search);
    const csvParam = params.get("csv");
    if (csvParam) {
      fetch(csvParam)
        .then((r) => {
          if (!r.ok) throw new Error(r.statusText);
          return r.text();
        })
        .then((text) => loadCsvText(text, csvParam))
        .catch(loadEmbeddedCsv);
    } else {
      loadEmbeddedCsv();
    }
  </script>
</body>
</html>
