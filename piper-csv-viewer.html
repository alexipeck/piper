<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piper CSV Viewer</title>
  <!-- Session (path, columns, zoom, etc.) is saved in localStorage and restored on reload via path re-fetch. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 13px;
      background: #14161a;
      color: #d8dce3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
      padding: 10px 14px;
      border-bottom: 1px solid #2a2f38;
      background: #1a1d23;
      flex-shrink: 0;
    }
    .toolbar label { color: #8b93a1; }
    .file-picker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .file-picker-btn {
      font-size: 12px;
      padding: 4px 10px;
      background: #2a3140;
      border: 1px solid #3d4656;
      color: #d8dce3;
      border-radius: 4px;
      white-space: nowrap;
    }
    .file-picker:hover .file-picker-btn { background: #354052; }
    .file-picker-input {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .file-picker-name {
      color: #8b93a1;
      font-size: 12px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .toolbar input[type="text"].csv-path {
      flex: 1;
      min-width: 180px;
      max-width: 480px;
      padding: 4px 8px;
      border: 1px solid #3d4656;
      border-radius: 4px;
      background: #14161a;
      color: #d8dce3;
      font-size: 12px;
    }
    .toolbar input[type="range"] { width: 140px; }
    .toolbar button {
      background: #2a3140;
      border: 1px solid #3d4656;
      color: #d8dce3;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #354052; }
    .drop-hint {
      color: #6b7280;
      font-size: 12px;
    }
    .drop-hint.drag-over { color: #7eb8ff; }
    .row-label { min-width: 72px; font-variant-numeric: tabular-nums; }
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid #2a2f38;
      display: flex;
      flex-direction: column;
      background: #181b21;
    }
    .sidebar-head {
      padding: 10px;
      border-bottom: 1px solid #2a2f38;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sidebar-head input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #3d4656;
      border-radius: 4px;
      background: #14161a;
      color: #d8dce3;
    }
    .sidebar-actions { display: flex; gap: 6px; }
    .sidebar-actions button {
      flex: 1;
      font-size: 11px;
      padding: 4px 6px;
      background: #2a3140;
      border: 1px solid #3d4656;
      color: #d8dce3;
      border-radius: 4px;
      cursor: pointer;
    }
    .sidebar-actions button:hover { background: #354052; }
    .mini-btn {
      font-size: 11px;
      padding: 2px 6px;
      background: #2a3140;
      border: 1px solid #3d4656;
      color: #d8dce3;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .mini-btn:hover { background: #354052; }
    .word-groups {
      border-bottom: 1px solid #2a2f38;
      max-height: 200px;
      overflow-y: auto;
      padding: 6px 8px;
      flex-shrink: 0;
    }
    .word-groups-title {
      font-size: 11px;
      color: #8b93a1;
      margin-bottom: 6px;
    }
    .word-group-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      font-size: 11px;
    }
    .word-group-row.hidden-filter { display: none; }
    .word-group-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #d8dce3;
    }
    .word-group-count {
      color: #6b7280;
      flex-shrink: 0;
    }
    .word-group-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .column-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .column-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      cursor: pointer;
      user-select: none;
    }
    .column-item:hover { background: #22262e; }
    .column-item.hidden-filter { display: none; }
    .column-item input { margin: 0; cursor: pointer; }
    .column-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .chart-section {
      flex: 3;
      display: flex;
      flex-direction: column;
      min-height: 200px;
      border-bottom: 1px solid #2a2f38;
      background: #14161a;
    }
    .chart-head {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 6px 14px;
      flex-shrink: 0;
      color: #8b93a1;
      font-size: 12px;
    }
    .chart-head label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .chart-head button {
      background: #2a3140;
      border: 1px solid #3d4656;
      color: #d8dce3;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }
    .chart-head button:hover:not(:disabled) { background: #354052; }
    .chart-head button:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .chart-head .chart-hint {
      color: #6b7280;
      font-size: 11px;
    }
    .chart-wrap .u-select {
      background: rgba(126, 184, 255, 0.14);
      border: 1px solid rgba(126, 184, 255, 0.55);
    }
    .chart-head .y-range {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      flex-wrap: wrap;
    }
    .chart-head .y-range input[type="number"] {
      width: 72px;
      padding: 4px 6px;
      border: 1px solid #3d4656;
      border-radius: 4px;
      background: #14161a;
      color: #d8dce3;
      font-variant-numeric: tabular-nums;
    }
    .chart-head .y-range .y-range-hint {
      color: #6b7280;
      font-size: 11px;
    }
    .chart-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      padding: 0 8px 4px;
      overflow: visible;
    }
    .chart-wrap .uplot {
      font-family: inherit;
    }
    .chart-wrap .u-legend { display: none; }
    #chartHost { width: 100%; height: 100%; overflow: visible; }
    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      padding: 4px 14px 8px;
      flex-shrink: 0;
      max-height: 56px;
      overflow-y: auto;
    }
    .chart-series-hint {
      color: #7eb8ff;
      font-size: 11px;
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 1;
      min-width: 0;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #8b93a1;
      cursor: pointer;
    }
    .legend-item:hover { color: #b8c0cc; }
    .legend-item.picked {
      color: #d8dce3;
      font-weight: 600;
    }
    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .table-section {
      flex: 2;
      display: flex;
      flex-direction: column;
      min-height: 140px;
    }
    .table-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
    }
    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #1f2430;
      border-bottom: 2px solid #3d4656;
      padding: 6px 10px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    tbody td {
      padding: 4px 10px;
      border-bottom: 1px solid #232830;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #1e232c; }
    tbody tr.selected { background: #253045; }
    tbody tr.selected td { border-bottom-color: #354052; }
    .detail {
      flex-shrink: 0;
      max-height: 120px;
      overflow: auto;
      border-top: 1px solid #2a2f38;
      background: #181b21;
      padding: 10px 14px;
    }
    .detail h3 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 600;
      color: #8b93a1;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 4px 16px;
    }
    .detail-pair {
      display: flex;
      gap: 8px;
      font-size: 12px;
      min-width: 0;
    }
    .detail-pair dt {
      margin: 0;
      color: #7eb8ff;
      flex-shrink: 0;
      max-width: 50%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .detail-pair dd {
      margin: 0;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .empty-state {
      padding: 24px;
      color: #6b7280;
      text-align: center;
    }
    .status { color: #8b93a1; font-size: 12px; }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <label class="file-picker">
      <span class="file-picker-btn">Choose file</span>
      <input type="file" id="fileInput" class="file-picker-input" accept=".csv,text/csv">
      <span class="file-picker-name" id="fileInputLabel">No file chosen</span>
    </label>
    <input type="text" class="csv-path" id="csvPathInput" placeholder="C:\full\path\to\file.csv">
    <button type="button" id="csvPathLoad">Load path</button>
    <span class="drop-hint" id="dropHint">Session saves path and settings — reload restores via path field</span>
    <label><input type="checkbox" id="logScale"> Log Y</label>
    <label><input type="checkbox" id="showAllRows" checked> Show all rows</label>
    <button type="button" id="prevRow" disabled>&larr;</button>
    <input type="range" id="rowSlider" min="0" max="0" value="0" disabled>
    <button type="button" id="nextRow" disabled>&rarr;</button>
    <span class="row-label" id="rowLabel">—</span>
    <span class="status" id="status"></span>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <input type="search" id="columnSearch" placeholder="Filter columns…" disabled>
        <div class="sidebar-actions">
          <button type="button" id="selectAll" disabled>All</button>
          <button type="button" id="selectNone" disabled>None</button>
        </div>
      </div>
      <div class="word-groups" id="wordGroups" hidden>
        <div class="word-groups-title">Groups by word</div>
        <div class="word-groups-list" id="wordGroupsList"></div>
      </div>
      <div class="column-list" id="columnList"></div>
    </aside>
    <div class="main">
      <section class="chart-section" id="chartSection">
        <div class="chart-head">
          <span>Graph — drag to zoom X (elapsed_ms)</span>
          <button type="button" id="xZoomReset" disabled>Reset X zoom</button>
          <span class="chart-hint" id="xZoomHint"></span>
          <span class="chart-series-hint" id="chartSeriesHint">Click a line to identify</span>
          <div class="y-range">
            <span>Y min</span>
            <input type="text" id="yMinOverride" inputmode="decimal" placeholder="auto" disabled>
            <span>Y max</span>
            <input type="text" id="yMaxOverride" inputmode="decimal" placeholder="auto" disabled>
            <button type="button" id="yRangeFromData" disabled>From data</button>
            <button type="button" id="yRangeApply" disabled>Apply</button>
            <button type="button" id="yRangeAuto" disabled>Auto</button>
            <span class="y-range-hint" id="yRangeHint"></span>
          </div>
        </div>
        <div class="chart-wrap" id="chartWrap">
          <p class="empty-state" id="chartEmpty">Load CSV and select numeric columns to graph.</p>
          <div id="chartHost"></div>
        </div>
        <div class="chart-legend" id="chartLegend"></div>
      </section>
      <div class="table-section">
        <div class="table-wrap" id="tableWrap" tabindex="0">
          <p class="empty-state" id="emptyState">Load a Piper CSV to begin.</p>
          <table id="dataTable" hidden>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <section class="detail" id="detailPanel" hidden>
          <h3 id="detailTitle">Row detail</h3>
          <dl class="detail-grid" id="detailGrid"></dl>
        </section>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
  <script>
    const CHART_COLORS = [
      "#7eb8ff", "#f59e0b", "#34d399", "#f472b6", "#a78bfa",
      "#fb7185", "#38bdf8", "#fbbf24", "#4ade80", "#c084fc",
    ];

    const state = {
      headers: [],
      rows: [],
      visible: [],
      selectedRowIndex: 0,
      showAllRows: true,
      searchQuery: "",
      wordGroups: [],
      logScale: false,
      yMin: null,
      yMax: null,
      xFullMin: null,
      xFullMax: null,
      xZoomMin: null,
      xZoomMax: null,
      plot: null,
      syncingCursor: false,
      csvPath: null,
      chartSeriesCols: [],
      pickedPlotSeries: null,
      xValues: null,
      seriesCache: null,
      numericColumns: null,
      chartLogScale: false,
      chartYLocked: false,
    };

    let storageApplyDepth = 0;
    let storageSaveTimer = null;
    const STORAGE_KEY = "piperViewerSave";
    const CSV_CACHE_KEY = "piperViewerCsvCache";

    function pathKey(path) {
      return (path || "").trim().replace(/\\/g, "/").toLowerCase();
    }

    function buildConfigFromState() {
      if (state.headers.length === 0) return null;
      const cfg = {};
      const visibleNames = state.headers.filter((h, i) => state.visible[i]);
      if (visibleNames.length === state.headers.length) cfg.cols = "all";
      else if (visibleNames.length === 0) cfg.cols = "none";
      else cfg.cols = visibleNames;
      if (state.logScale) cfg.log = true;
      if (state.showAllRows) cfg.allRows = true;
      if (state.selectedRowIndex > 0) cfg.row = state.selectedRowIndex;
      if (state.searchQuery) cfg.q = state.searchQuery;
      if (state.yMin != null) cfg.ymin = state.yMin;
      if (state.yMax != null) cfg.ymax = state.yMax;
      if (hasXZoom()) {
        cfg.xmin = state.xZoomMin;
        cfg.xmax = state.xZoomMax;
      }
      return Object.keys(cfg).length > 0 ? cfg : null;
    }

    function loadSavedState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (_) {
        return null;
      }
    }

    function loadCsvCache(path) {
      try {
        const raw = localStorage.getItem(CSV_CACHE_KEY);
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (cached?.csvText && pathKey(cached.path) === pathKey(path)) return cached.csvText;
      } catch (_) {}
      return null;
    }

    function persistCsvCache(text, path) {
      if (!text || !path) return;
      try {
        localStorage.setItem(
          CSV_CACHE_KEY,
          JSON.stringify({ path: pathKey(path), csvText: text })
        );
      } catch (_) {}
    }

    function persistToStorage() {
      if (storageApplyDepth > 0 || state.headers.length === 0) return;
      const path = (state.csvPath || csvPathInput.value || "").trim() || null;
      try {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({
            csvPath: path,
            config: buildConfigFromState(),
          })
        );
      } catch (_) {
        statusEl.textContent =
          (statusEl.textContent ? statusEl.textContent + " — " : "") +
          "Could not save session (browser storage may be full).";
      }
    }

    function scheduleStorageSave() {
      if (storageApplyDepth > 0) return;
      clearTimeout(storageSaveTimer);
      storageSaveTimer = setTimeout(persistToStorage, 150);
    }

    function updateFileLabel() {
      const path =
        state.csvPath ||
        csvPathInput.value.trim() ||
        fileInput.files?.[0]?.name ||
        "";
      if (!path) {
        fileInputLabel.textContent = "No file chosen";
        fileInputLabel.title = "";
        return;
      }
      const base = path.replace(/^.*[/\\]/, "") || path;
      fileInputLabel.textContent = base;
      fileInputLabel.title = path;
    }

    const fileInput = document.getElementById("fileInput");
    const fileInputLabel = document.getElementById("fileInputLabel");
    const csvPathInput = document.getElementById("csvPathInput");
    const csvPathLoad = document.getElementById("csvPathLoad");
    const dropHint = document.getElementById("dropHint");
    const logScaleEl = document.getElementById("logScale");
    const showAllRowsEl = document.getElementById("showAllRows");
    const chartWrap = document.getElementById("chartWrap");
    const chartHost = document.getElementById("chartHost");
    const chartEmpty = document.getElementById("chartEmpty");
    const chartLegend = document.getElementById("chartLegend");
    const chartSection = document.getElementById("chartSection");
    const yMinOverride = document.getElementById("yMinOverride");
    const yMaxOverride = document.getElementById("yMaxOverride");
    const yRangeFromData = document.getElementById("yRangeFromData");
    const yRangeApply = document.getElementById("yRangeApply");
    const yRangeAuto = document.getElementById("yRangeAuto");
    const yRangeHint = document.getElementById("yRangeHint");
    const xZoomReset = document.getElementById("xZoomReset");
    const xZoomHint = document.getElementById("xZoomHint");
    const chartSeriesHint = document.getElementById("chartSeriesHint");
    const rowSlider = document.getElementById("rowSlider");
    const prevRow = document.getElementById("prevRow");
    const nextRow = document.getElementById("nextRow");
    const rowLabel = document.getElementById("rowLabel");
    const statusEl = document.getElementById("status");
    const columnSearch = document.getElementById("columnSearch");
    const selectAllBtn = document.getElementById("selectAll");
    const selectNoneBtn = document.getElementById("selectNone");
    const columnList = document.getElementById("columnList");
    const wordGroupsEl = document.getElementById("wordGroups");
    const wordGroupsList = document.getElementById("wordGroupsList");
    const tableWrap = document.getElementById("tableWrap");
    const emptyState = document.getElementById("emptyState");
    const dataTable = document.getElementById("dataTable");
    const tableHead = document.getElementById("tableHead");
    const tableBody = document.getElementById("tableBody");
    const detailPanel = document.getElementById("detailPanel");
    const detailTitle = document.getElementById("detailTitle");
    const detailGrid = document.getElementById("detailGrid");

    function parseCsvLine(line) {
      const fields = [];
      let i = 0;
      let field = "";
      while (i < line.length) {
        if (line[i] === '"') {
          i += 1;
          while (i < line.length) {
            if (line[i] === '"') {
              if (line[i + 1] === '"') {
                field += '"';
                i += 2;
              } else {
                i += 1;
                break;
              }
            } else {
              field += line[i];
              i += 1;
            }
          }
          if (line[i] === ",") i += 1;
        } else {
          while (i < line.length && line[i] !== ",") {
            field += line[i];
            i += 1;
          }
          if (line[i] === ",") i += 1;
        }
        fields.push(field);
        field = "";
      }
      return fields;
    }

    function parseCsv(text) {
      const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
      const nonEmpty = lines.filter((l) => l.length > 0);
      if (nonEmpty.length === 0) return { headers: [], rows: [] };
      const headers = parseCsvLine(nonEmpty[0]);
      const colCount = headers.length;
      const rows = [];
      for (let r = 1; r < nonEmpty.length; r++) {
        const cells = parseCsvLine(nonEmpty[r]);
        while (cells.length < colCount) cells.push("");
        if (cells.length > colCount) cells.length = colCount;
        rows.push(cells);
      }
      return { headers, rows };
    }

    function isNumericColumn(ci) {
      const name = state.headers[ci];
      if (name === "elapsed_ms") return false;
      if (/_name$|_state$|_scaling_state$|_probe_state$|_outcome$/.test(name)) return false;
      if (/^(shutdown_requested|abort_requested|pending_scale_operation|anchor_name)$/.test(name)) return false;
      if (/^stage\d+_is_anchor$/.test(name)) return false;
      for (const row of state.rows) {
        const n = Number(row[ci]);
        if (Number.isFinite(n)) return true;
      }
      return false;
    }

    function defaultVisible() {
      const picked = state.numericColumns.slice();
      if (picked.some(Boolean)) return picked;
      return state.headers.map(() => true);
    }

    function buildDataCaches() {
      const n = state.rows.length;
      const xi = xAxisIndex();
      state.xValues = new Array(n);
      if (xi >= 0) {
        for (let i = 0; i < n; i++) state.xValues[i] = Number(state.rows[i][xi]);
      } else {
        for (let i = 0; i < n; i++) state.xValues[i] = i;
      }
      state.seriesCache = new Map();
      for (let ci = 0; ci < state.headers.length; ci++) {
        if (!state.numericColumns[ci]) continue;
        const arr = new Array(n);
        for (let i = 0; i < n; i++) {
          const num = Number(state.rows[i][ci]);
          arr[i] = Number.isFinite(num) ? num : null;
        }
        state.seriesCache.set(ci, arr);
      }
    }

    function seriesColsEqual(a, b) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
      return true;
    }

    function buildChartData(series) {
      const data = [state.xValues];
      for (const ci of series) data.push(state.seriesCache.get(ci));
      return data;
    }

    function rowIndexRangeForXRange(xMin, xMax) {
      const x = state.xValues;
      if (!x || x.length === 0) return { start: 0, end: 0 };
      let lo = 0;
      let hi = x.length;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (x[mid] < xMin) lo = mid + 1;
        else hi = mid;
      }
      const start = lo;
      lo = start;
      hi = x.length;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (x[mid] <= xMax) lo = mid + 1;
        else hi = mid;
      }
      return { start, end: lo };
    }

    function applySavedConfigUiOnly(cfg) {
      if (!cfg) return;
      storageApplyDepth++;
      try {
        if (cfg.log != null) {
          state.logScale = cfg.log;
          logScaleEl.checked = cfg.log;
        }
        if (cfg.allRows != null) {
          state.showAllRows = cfg.allRows;
          showAllRowsEl.checked = cfg.allRows;
        }
        if (cfg.q != null) {
          state.searchQuery = cfg.q;
          columnSearch.value = cfg.q;
        }
        if (cfg.ymin != null || cfg.ymax != null) {
          state.yMin = cfg.ymin ?? null;
          state.yMax = cfg.ymax ?? null;
          yMinOverride.value = cfg.ymin != null ? String(cfg.ymin) : "";
          yMaxOverride.value = cfg.ymax != null ? String(cfg.ymax) : "";
        }
      } finally {
        storageApplyDepth--;
      }
    }

    function applySavedConfig(cfg) {
      if (!cfg || state.headers.length === 0) return;
      storageApplyDepth++;
      try {
        if (cfg.cols === "all") {
          state.visible = state.headers.map(() => true);
        } else if (cfg.cols === "none") {
          state.visible = state.headers.map(() => false);
        } else if (Array.isArray(cfg.cols)) {
          const set = new Set(cfg.cols);
          state.visible = state.headers.map((h) => set.has(h));
        }
        if (cfg.log != null) {
          state.logScale = cfg.log;
          logScaleEl.checked = cfg.log;
        }
        if (cfg.allRows != null) {
          state.showAllRows = cfg.allRows;
          showAllRowsEl.checked = cfg.allRows;
        }
        if (cfg.q != null) {
          state.searchQuery = cfg.q;
          columnSearch.value = cfg.q;
        }
        if (cfg.ymin != null || cfg.ymax != null) {
          state.yMin = cfg.ymin ?? null;
          state.yMax = cfg.ymax ?? null;
          yMinOverride.value = cfg.ymin != null ? String(cfg.ymin) : "";
          yMaxOverride.value = cfg.ymax != null ? String(cfg.ymax) : "";
          yRangeHint.textContent = hasYRangeLock() ? formatYRangeHint() : "";
        }
        if (cfg.xmin != null && cfg.xmax != null && cfg.xmax > cfg.xmin) {
          state.xZoomMin = cfg.xmin;
          state.xZoomMax = cfg.xmax;
        }
        syncColumnCheckboxes();
        applyColumnFilter();
        if (cfg.row != null && state.rows.length > 0) {
          const ri = Math.max(0, Math.min(cfg.row, state.rows.length - 1));
          state.selectedRowIndex = ri;
          rowSlider.value = String(ri);
        }
        updateRowControls();
        renderAll();
      } finally {
        storageApplyDepth--;
      }
      scheduleStorageSave();
    }

    function isFullFilesystemPath(p) {
      if (!p) return false;
      return (
        /^file:\/\//i.test(p) ||
        /^[a-zA-Z]:[\\/]/.test(p) ||
        p.startsWith("\\\\") ||
        (p.startsWith("/") && p.length > 1)
      );
    }

    function encodeFilePathSegment(seg) {
      if (seg === "") return "";
      if (/^[a-zA-Z]:$/.test(seg)) return seg;
      return encodeURIComponent(seg);
    }

    function slashPathToFileUrl(slashPath) {
      const encoded = slashPath
        .split("/")
        .map(encodeFilePathSegment)
        .join("/");
      if (/^\/[a-zA-Z]:\//.test(slashPath) || /^\/[a-zA-Z]:$/.test(slashPath)) {
        return "file://" + encoded;
      }
      if (slashPath.startsWith("//")) return "file:" + encoded;
      return "file://" + encoded;
    }

    function resolveCsvFetchUrl(pathParam) {
      const trimmed = pathParam.trim();
      if (!trimmed) return null;
      if (/^file:\/\//i.test(trimmed)) {
        try {
          return new URL(trimmed).href;
        } catch {
          return slashPathToFileUrl(trimmed.replace(/^file:\/\//i, "/"));
        }
      }
      let slashPath = trimmed.replace(/\\/g, "/");
      if (/^[a-zA-Z]:/.test(slashPath)) slashPath = "/" + slashPath;
      else if (trimmed.startsWith("\\\\")) {
        slashPath = "//" + trimmed.slice(2).replace(/\\/g, "/");
      } else if (!slashPath.startsWith("/")) {
        try {
          return new URL(trimmed, location.href).href;
        } catch {
          return null;
        }
      }
      return slashPathToFileUrl(slashPath);
    }

    function csvFetchTargets(pathParam) {
      const targets = [];
      const seen = new Set();
      const add = (u) => {
        if (u && !seen.has(u)) {
          seen.add(u);
          targets.push(u);
        }
      };
      const base = pathParam.replace(/^.*[/\\]/, "");
      if (base) {
        try {
          add(new URL(base, location.href).href);
        } catch (_) {}
      }
      add(resolveCsvFetchUrl(pathParam));
      if (!isFullFilesystemPath(pathParam) && !pathParam.includes("/") && !pathParam.includes("\\")) {
        try {
          add(new URL(pathParam, location.href).href);
        } catch (_) {}
      }
      return targets;
    }

    function localFileAccessHint() {
      if (location.protocol !== "file:") return "";
      return " From file://, Chromium may need --allow-file-access-from-files, or place the CSV next to this HTML file.";
    }

    function loadCsvFromPath(pathParam, savedConfig, opts = {}) {
      const path = pathParam.trim();
      if (!path) return;
      state.csvPath = path;
      csvPathInput.value = path;
      const targets = csvFetchTargets(path);
      const tryFallback = () => {
        const cached =
          opts.fallbackText ||
          loadCsvCache(path) ||
          (opts.legacySaved?.csvText &&
          pathKey(opts.legacySaved.csvPath || path) === pathKey(path)
            ? opts.legacySaved.csvText
            : null);
        if (cached) {
          loadCsvText(cached, path, savedConfig);
          return;
        }
        statusEl.textContent = `Could not load: ${path}.${localFileAccessHint()}`;
      };
      const tryNext = (i) => {
        if (i >= targets.length) {
          tryFallback();
          return;
        }
        fetch(targets[i])
          .then((r) => {
            if (!r.ok) throw new Error(r.statusText);
            return r.text();
          })
          .then((text) => loadCsvText(text, path, savedConfig))
          .catch(() => tryNext(i + 1));
      };
      if (targets.length === 0) {
        tryFallback();
        return;
      }
      tryNext(0);
    }

    function loadCsvText(text, name, savedConfig) {
      const { headers, rows } = parseCsv(text);
      state.headers = headers;
      state.rows = rows;
      const pathLabel = (name || "").trim() || state.csvPath || "saved.csv";
      state.csvPath = pathLabel;
      csvPathInput.value = pathLabel;
      state.numericColumns = state.headers.map((_, i) => isNumericColumn(i));
      buildDataCaches();
      state.visible = defaultVisible();
      state.selectedRowIndex = rows.length > 0 ? 0 : -1;
      state.yMin = null;
      state.yMax = null;
      state.xZoomMin = null;
      state.xZoomMax = null;
      yMinOverride.value = "";
      yMaxOverride.value = "";
      yRangeHint.textContent = "";
      refreshFullXExtents();
      updateXZoomUi();
      let status = `${pathLabel}: ${rows.length} rows, ${headers.length} columns`;
      if (!isFullFilesystemPath(pathLabel)) {
        status += " — Enter a full path to auto-reload after page refresh.";
      }
      statusEl.textContent = status;
      enableControls(true);
      buildWordGroups();
      buildWordGroupPanel();
      buildColumnList();
      if (savedConfig) applySavedConfig(savedConfig);
      else renderAll();
      updateFileLabel();
      persistCsvCache(text, pathLabel);
      persistToStorage();
    }

    function renderAll() {
      renderChart();
      renderTable();
      renderDetail();
      updateRowControls();
    }

    function destroyChart() {
      state.pickedPlotSeries = null;
      if (state.plot) {
        state.plot.destroy();
        state.plot = null;
      }
      chartHost.replaceChildren();
      chartLegend.replaceChildren();
    }

    function xAxisIndex() {
      return state.headers.indexOf("elapsed_ms");
    }

    function getXValues() {
      if (state.xValues) return state.xValues;
      const xi = xAxisIndex();
      if (xi >= 0) {
        return state.rows.map((r) => Number(r[xi]));
      }
      return state.rows.map((_, i) => i);
    }

    function refreshFullXExtents() {
      const x = getXValues();
      if (x.length === 0) {
        state.xFullMin = null;
        state.xFullMax = null;
        return;
      }
      let min = Infinity;
      let max = -Infinity;
      for (let i = 0; i < x.length; i++) {
        if (x[i] < min) min = x[i];
        if (x[i] > max) max = x[i];
      }
      state.xFullMin = min;
      state.xFullMax = max;
    }

    function hasXZoom() {
      return state.xZoomMin != null && state.xZoomMax != null;
    }

    function updateXZoomUi() {
      if (!hasXZoom()) {
        xZoomReset.disabled = state.rows.length === 0;
        xZoomHint.textContent = "";
        return;
      }
      xZoomReset.disabled = false;
      const lo = state.xZoomMin;
      const hi = state.xZoomMax;
      const fmt = (v) => (v >= 1000 ? `${(v / 1000).toFixed(2)}s` : `${v}ms`);
      xZoomHint.textContent = `X zoomed: ${fmt(lo)} – ${fmt(hi)}`;
    }

    function applyXZoomToPlot() {
      if (!state.plot || !hasXZoom()) return;
      state.plot.setScale("x", { min: state.xZoomMin, max: state.xZoomMax });
      applyYRangeToPlot();
    }

    function resetXZoom() {
      state.xZoomMin = null;
      state.xZoomMax = null;
      if (state.plot && state.xFullMin != null && state.xFullMax != null) {
        state.plot.setScale("x", { min: state.xFullMin, max: state.xFullMax });
        state.plot.setSelect({ left: 0, width: 0, top: 0, height: 0 }, false);
        if (hasYRangeLock()) applyYRangeToPlot();
        else {
          const ext = plottedValueExtents();
          if (ext) state.plot.setScale("y", { min: ext.min, max: ext.max });
        }
        syncPlotLayout();
      }
      updateXZoomUi();
      scheduleStorageSave();
    }

    function syncXZoomStateFromPlot(u) {
      const sc = u.scales.x;
      if (!sc || sc.min == null || sc.max == null) return;
      if (state.xFullMin == null || state.xFullMax == null) return;
      const span = state.xFullMax - state.xFullMin;
      const eps = Math.max(span * 0.0005, 1e-6);
      const zoomed = sc.min > state.xFullMin + eps || sc.max < state.xFullMax - eps;
      if (zoomed) {
        state.xZoomMin = sc.min;
        state.xZoomMax = sc.max;
      } else {
        state.xZoomMin = null;
        state.xZoomMax = null;
      }
      updateXZoomUi();
      scheduleStorageSave();
    }

    function chartSeriesIndices() {
      const xi = xAxisIndex();
      return visibleColumnIndices().filter((ci) => ci !== xi && state.numericColumns[ci]);
    }

    function plottedValueExtents() {
      const series = chartSeriesIndices();
      let start = 0;
      let end = state.rows.length;
      if (!hasYRangeLock() && hasXZoom()) {
        const range = rowIndexRangeForXRange(state.xZoomMin, state.xZoomMax);
        start = range.start;
        end = range.end;
      }
      let min = Infinity;
      let max = -Infinity;
      for (const ci of series) {
        const cached = state.seriesCache?.get(ci);
        if (cached) {
          for (let i = start; i < end; i++) {
            const n = cached[i];
            if (n == null || !Number.isFinite(n)) continue;
            if (n < min) min = n;
            if (n > max) max = n;
          }
        } else {
          for (let i = start; i < end; i++) {
            const n = Number(state.rows[i][ci]);
            if (!Number.isFinite(n)) continue;
            if (n < min) min = n;
            if (n > max) max = n;
          }
        }
      }
      if (!Number.isFinite(min) || !Number.isFinite(max)) return null;
      if (min === max) {
        const pad = Math.abs(min) * 0.05 || 1;
        return { min: min - pad, max: max + pad };
      }
      const pad = (max - min) * 0.02;
      return { min: min - pad, max: max + pad };
    }

    function parseAxisInput(el) {
      const raw = el.value.trim();
      if (raw === "") return null;
      const n = Number(raw);
      return Number.isFinite(n) ? n : null;
    }

    function readYRangeInputs() {
      return {
        ymin: parseAxisInput(yMinOverride),
        ymax: parseAxisInput(yMaxOverride),
      };
    }

    function hasYRangeLock() {
      return state.yMin != null || state.yMax != null;
    }

    function effectiveYRange() {
      const ext = plottedValueExtents();
      const dMin = ext ? ext.min : 0;
      const dMax = ext ? ext.max : 1;
      const lo = state.yMin != null ? state.yMin : dMin;
      const hi = state.yMax != null ? state.yMax : dMax;
      if (!Number.isFinite(lo) || !Number.isFinite(hi) || lo >= hi) return null;
      return [lo, hi];
    }

    function yRangeFn(_u, dataMin, dataMax) {
      if (hasYRangeLock()) {
        const locked = effectiveYRange();
        if (locked) return locked;
      }
      const lo = dataMin != null && Number.isFinite(dataMin) ? dataMin : 0;
      const hi = dataMax != null && Number.isFinite(dataMax) ? dataMax : lo + 1;
      return lo < hi ? [lo, hi] : [hi - 1, hi];
    }

    function yAutoFn() {
      return !hasYRangeLock();
    }

    function buildYScaleOpts() {
      const y = {
        auto: yAutoFn,
        range: yRangeFn,
      };
      if (state.logScale) y.distr = 3;
      return y;
    }

    function formatYAxisLabel(v) {
      if (v == null || !Number.isFinite(v)) return "";
      const abs = Math.abs(v);
      if (abs === 0) return "0";
      if (state.logScale) return v.toPrecision(3);
      if (abs >= 1e9) return (v / 1e9).toFixed(1) + "G";
      if (abs >= 1e6) return (v / 1e6).toFixed(1) + "M";
      if (abs >= 1e4) return (v / 1e3).toFixed(1) + "k";
      if (abs >= 100) return v.toFixed(0);
      if (abs >= 10) return v.toFixed(1);
      if (abs >= 1) return v.toFixed(2);
      return v.toPrecision(3);
    }

    function chartDimensions() {
      return {
        w: Math.max(chartHost.clientWidth || chartWrap.clientWidth, 320),
        h: Math.max(chartHost.clientHeight || chartWrap.clientHeight, 160),
      };
    }

    function syncPlotLayout() {
      if (!state.plot) return;
      const { w, h } = chartDimensions();
      state.plot.setSize({ width: w, height: h });
    }

    function buildYAxisOpts() {
      return {
        stroke: "#8b93a1",
        grid: { stroke: "#2a2f38" },
        values: (_u, vals) => vals.map(formatYAxisLabel),
        gap: 8,
      };
    }

    function applyYRangeToPlot() {
      if (!state.plot || !hasYRangeLock()) return;
      const r = effectiveYRange();
      if (!r) return;
      const y = state.plot.scales.y;
      y.auto = yAutoFn;
      y.range = yRangeFn;
      state.plot.setScale("y", { min: r[0], max: r[1] });
      syncPlotLayout();
    }

    function formatYRangeHint() {
      const r = effectiveYRange();
      if (!r) return "Invalid Y range.";
      return `Y axis locked: ${r[0]} … ${r[1]}`;
    }

    function applyYRangeFromInputs() {
      const { ymin, ymax } = readYRangeInputs();
      if (ymin == null && ymax == null) {
        yRangeHint.textContent = "Enter Y min and/or Y max.";
        return false;
      }
      if (ymin != null && ymax != null && ymin >= ymax) {
        yRangeHint.textContent = "Y min must be less than Y max.";
        return false;
      }
      if (state.logScale && ymin != null && ymin <= 0) {
        yRangeHint.textContent = "Log scale requires Y min > 0.";
        return false;
      }
      state.yMin = ymin;
      state.yMax = ymax;
      const r = effectiveYRange();
      if (!r) {
        yRangeHint.textContent = "Could not resolve Y range for current series.";
        return false;
      }
      if (state.logScale && r[0] <= 0) {
        yRangeHint.textContent = "Log scale requires Y min > 0.";
        return false;
      }
      if (state.plot && chartSeriesIndices().length > 0) {
        applyYRangeToPlot();
      } else {
        renderChart();
      }
      yRangeHint.textContent = formatYRangeHint();
      scheduleStorageSave();
      return true;
    }

    function clearYRangeOverride() {
      state.yMin = null;
      state.yMax = null;
      yMinOverride.value = "";
      yMaxOverride.value = "";
      yRangeHint.textContent = "Y axis auto-scales to data.";
      renderChart();
      scheduleStorageSave();
    }

    function updateChartSeriesHint(plotSi, hover) {
      if (!state.plot) return;
      if (plotSi != null && plotSi > 0) {
        const name = state.plot.series[plotSi].label || state.headers[state.chartSeriesCols[plotSi - 1]];
        chartSeriesHint.textContent = hover ? `Nearest: ${name}` : `Series: ${name}`;
        return;
      }
      if (!state.pickedPlotSeries) {
        chartSeriesHint.textContent = "Click a line to identify";
      }
    }

    function updateLegendPick(plotSi) {
      chartLegend.querySelectorAll(".legend-item").forEach((el) => {
        const si = Number(el.dataset.si);
        el.classList.toggle("picked", plotSi != null && si + 1 === plotSi);
      });
    }

    function applySeriesPick(u, plotSi) {
      state.pickedPlotSeries = plotSi;
      for (let i = 1; i < u.series.length; i++) {
        const on = i === plotSi;
        u.setSeries(i, { width: on ? 3 : 1 }, false);
      }
      updateChartSeriesHint(plotSi, false);
      updateLegendPick(plotSi);
    }

    function clearSeriesPick() {
      state.pickedPlotSeries = null;
      const u = state.plot;
      if (u) {
        for (let i = 1; i < u.series.length; i++) {
          u.setSeries(i, { width: 2 }, false);
        }
      }
      chartSeriesHint.textContent = "Click a line to identify";
      updateLegendPick(null);
    }

    function pickNearestSeries(u, left, top) {
      u.setCursor({ left, top }, true);
      const idx = u.cursor.idx;
      if (idx == null || idx < 0) return;
      let bestPlotSi = null;
      let bestDist = Infinity;
      for (let si = 1; si < u.series.length; si++) {
        const val = u.data[si][idx];
        if (val == null || !Number.isFinite(val)) continue;
        const yPx = u.valToPos(val, "y", true);
        const dist = Math.abs(yPx - top);
        if (dist < bestDist) {
          bestDist = dist;
          bestPlotSi = si;
        }
      }
      if (bestPlotSi == null || bestDist > 28) {
        clearSeriesPick();
        return;
      }
      if (state.pickedPlotSeries === bestPlotSi) {
        clearSeriesPick();
        return;
      }
      applySeriesPick(u, bestPlotSi);
    }

    function bindChartSeriesPick(u) {
      if (u.over.dataset.seriesPickBound) return;
      u.over.dataset.seriesPickBound = "1";
      u.over.addEventListener("mouseup", () => {
        if (state.plot !== u) return;
        if (u.select.width >= 8) return;
        pickNearestSeries(u, u.cursor.left, u.cursor.top);
      });
    }

    function renderChartLegend(series) {
      chartLegend.replaceChildren();
      series.forEach((ci, si) => {
        const item = document.createElement("span");
        item.className = "legend-item";
        if (state.pickedPlotSeries === si + 1) item.classList.add("picked");
        item.dataset.si = String(si);
        const sw = document.createElement("span");
        sw.className = "legend-swatch";
        sw.style.background = CHART_COLORS[si % CHART_COLORS.length];
        const label = document.createElement("span");
        label.textContent = state.headers[ci];
        item.append(sw, label);
        item.addEventListener("click", () => {
          if (!state.plot) return;
          const plotSi = si + 1;
          if (state.pickedPlotSeries === plotSi) clearSeriesPick();
          else applySeriesPick(state.plot, plotSi);
        });
        chartLegend.appendChild(item);
      });
    }

    function renderChart() {
      if (state.rows.length === 0) {
        destroyChart();
        chartEmpty.hidden = false;
        chartEmpty.textContent = "Load CSV and select numeric columns to graph.";
        return;
      }
      const series = chartSeriesIndices();
      const hasSeries = series.length > 0;
      if (!hasSeries) {
        destroyChart();
        chartEmpty.hidden = false;
        chartEmpty.textContent =
          "Select numeric columns in the sidebar to plot (e.g. busy_ratio, link lengths).";
        return;
      }

      chartEmpty.hidden = true;
      const data = buildChartData(series);
      const yLocked = hasYRangeLock();
      const canReuse =
        state.plot &&
        seriesColsEqual(series, state.chartSeriesCols) &&
        state.chartLogScale === state.logScale &&
        state.chartYLocked === yLocked;

      if (canReuse) {
        state.plot.setData(data);
        if (hasXZoom()) applyXZoomToPlot();
        else if (state.xFullMin != null && state.xFullMax != null) {
          state.plot.setScale("x", { min: state.xFullMin, max: state.xFullMax });
        }
        if (hasYRangeLock()) applyYRangeToPlot();
        else {
          const ext = plottedValueExtents();
          if (ext) state.plot.setScale("y", { min: ext.min, max: ext.max });
        }
        syncPlotLayout();
        syncChartCursor();
        updateXZoomUi();
        return;
      }

      destroyChart();
      state.chartSeriesCols = series.slice();
      state.chartLogScale = state.logScale;
      state.chartYLocked = yLocked;
      state.pickedPlotSeries = null;
      chartSeriesHint.textContent = "Click a line to identify";

      const seriesOpts = [{}];
      series.forEach((ci, si) => {
        seriesOpts.push({
          label: state.headers[ci],
          stroke: CHART_COLORS[si % CHART_COLORS.length],
          width: 2,
          auto: !yLocked,
        });
      });

      const { w, h } = chartDimensions();
      const scales = {
        x: { time: false },
        y: buildYScaleOpts(),
      };
      const opts = {
        width: w,
        height: h,
        series: seriesOpts,
        scales,
        axes: [
          {
            stroke: "#8b93a1",
            grid: { stroke: "#2a2f38" },
            values: (_u, vals) =>
              vals.map((v) => (v >= 1000 ? `${(v / 1000).toFixed(1)}s` : `${v}ms`)),
          },
          buildYAxisOpts(),
        ],
        select: {
          show: true,
          over: true,
          fill: "rgba(126, 184, 255, 0.14)",
          stroke: "rgba(126, 184, 255, 0.55)",
        },
        cursor: {
          drag: { x: true, y: false, setScale: true },
          focus: { prox: 24 },
          points: { size: 5, stroke: "#d8dce3", fill: "#14161a" },
        },
        hooks: {
          ready: [
            (u) => {
              bindChartSeriesPick(u);
              if (hasXZoom()) applyXZoomToPlot();
              else if (state.xFullMin != null && state.xFullMax != null) {
                u.setScale("x", { min: state.xFullMin, max: state.xFullMax });
              }
              if (hasYRangeLock()) applyYRangeToPlot();
              syncXZoomStateFromPlot(u);
            },
          ],
          setSeries: [
            (u, plotSi, opts) => {
              if (opts.focus == null || state.pickedPlotSeries != null) return;
              if (plotSi > 0) updateChartSeriesHint(plotSi, true);
              else if (!state.pickedPlotSeries) chartSeriesHint.textContent = "Click a line to identify";
            },
          ],
          setScale: [
            (u, key) => {
              if (key !== "x") return;
              syncXZoomStateFromPlot(u);
              if (hasYRangeLock()) applyYRangeToPlot();
              else {
                const ext = plottedValueExtents();
                if (ext) u.setScale("y", { min: ext.min, max: ext.max });
                syncPlotLayout();
              }
            },
          ],
          setCursor: [
            (u) => {
              if (state.syncingCursor) return;
              const idx = u.cursor.idx;
              if (idx == null || idx < 0 || idx === state.selectedRowIndex) return;
              const prev = state.selectedRowIndex;
              state.selectedRowIndex = idx;
              rowSlider.value = String(idx);
              updateRowControls();
              if (state.showAllRows && tableBody.childElementCount > 0) {
                updateTableSelection(prev, idx);
              } else {
                renderTable();
              }
              renderDetail();
              scheduleStorageSave();
            },
          ],
        },
      };

      refreshFullXExtents();
      state.plot = new uPlot(opts, data, chartHost);
      requestAnimationFrame(() => {
        if (state.plot) syncPlotLayout();
      });
      if (hasXZoom()) applyXZoomToPlot();
      if (yLocked) {
        applyYRangeToPlot();
        requestAnimationFrame(() => {
          if (state.plot && hasYRangeLock()) applyYRangeToPlot();
        });
      }
      renderChartLegend(series);
      syncChartCursor();
      updateXZoomUi();
    }

    function resizeChart() {
      if (!state.plot) return;
      syncPlotLayout();
      if (hasXZoom()) applyXZoomToPlot();
      if (hasYRangeLock()) applyYRangeToPlot();
    }

    function syncChartCursor() {
      if (!state.plot || state.selectedRowIndex < 0) return;
      state.syncingCursor = true;
      state.plot.setCursor({ idx: state.selectedRowIndex }, true);
      state.syncingCursor = false;
    }

    function enableControls(on) {
      columnSearch.disabled = !on;
      selectAllBtn.disabled = !on;
      selectNoneBtn.disabled = !on;
      const hasRows = on && state.rows.length > 0;
      rowSlider.disabled = !hasRows;
      prevRow.disabled = !hasRows;
      nextRow.disabled = !hasRows;
      if (hasRows) {
        rowSlider.max = String(state.rows.length - 1);
        rowSlider.value = String(Math.max(0, state.selectedRowIndex));
      }
      emptyState.hidden = on;
      dataTable.hidden = !on;
      detailPanel.hidden = !on || state.rows.length === 0;
      chartSection.hidden = !on;
      wordGroupsEl.hidden = !on;
      yMinOverride.disabled = !on;
      yMaxOverride.disabled = !on;
      yRangeFromData.disabled = !on;
      yRangeApply.disabled = !on;
      yRangeAuto.disabled = !on;
      xZoomReset.disabled = !on || !hasXZoom();
      if (!on) xZoomHint.textContent = "";
    }

    function visibleColumnIndices() {
      const out = [];
      for (let i = 0; i < state.headers.length; i++) {
        if (state.visible[i]) out.push(i);
      }
      return out;
    }

    function columnTokens(name) {
      return name.split("_").filter(Boolean);
    }

    function buildWordGroups() {
      const map = new Map();
      state.headers.forEach((name, i) => {
        for (const tok of columnTokens(name)) {
          if (!map.has(tok)) map.set(tok, []);
          const arr = map.get(tok);
          if (!arr.includes(i)) arr.push(i);
        }
      });
      state.wordGroups = [...map.entries()].sort(
        (a, b) => b[1].length - a[1].length || a[0].localeCompare(b[0])
      );
    }

    function syncColumnCheckboxes() {
      columnList.querySelectorAll(".column-item").forEach((el) => {
        const i = Number(el.dataset.index);
        const cb = el.querySelector('input[type="checkbox"]');
        if (cb) cb.checked = state.visible[i];
      });
    }

    function setColumnsVisible(indices, on) {
      for (const i of indices) state.visible[i] = on;
      syncColumnCheckboxes();
      renderAll();
      scheduleStorageSave();
    }

    function buildWordGroupPanel() {
      wordGroupsList.replaceChildren();
      for (const [word, indices] of state.wordGroups) {
        const row = document.createElement("div");
        row.className = "word-group-row";
        row.dataset.word = word;
        row.dataset.indices = indices.join(",");
        const label = document.createElement("span");
        label.className = "word-group-label";
        label.textContent = word;
        const count = document.createElement("span");
        count.className = "word-group-count";
        count.textContent = `(${indices.length})`;
        const actions = document.createElement("div");
        actions.className = "word-group-actions";
        const allBtn = document.createElement("button");
        allBtn.type = "button";
        allBtn.className = "mini-btn";
        allBtn.textContent = "All";
        allBtn.addEventListener("click", () => setColumnsVisible(indices, true));
        const noneBtn = document.createElement("button");
        noneBtn.type = "button";
        noneBtn.className = "mini-btn";
        noneBtn.textContent = "None";
        noneBtn.addEventListener("click", () => setColumnsVisible(indices, false));
        actions.append(allBtn, noneBtn);
        row.append(label, count, actions);
        wordGroupsList.appendChild(row);
      }
      applyColumnFilter();
    }

    function buildColumnList() {
      columnList.replaceChildren();
      state.headers.forEach((name, i) => {
        const item = document.createElement("label");
        item.className = "column-item";
        item.dataset.index = String(i);
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = state.visible[i];
        if (!state.numericColumns[i]) item.style.opacity = "0.55";
        cb.addEventListener("change", () => {
          state.visible[i] = cb.checked;
          renderAll();
          scheduleStorageSave();
        });
        const span = document.createElement("span");
        span.textContent = name;
        item.append(cb, span);
        item.addEventListener("click", (e) => {
          if (e.target === cb) return;
          cb.checked = !cb.checked;
          state.visible[i] = cb.checked;
          renderAll();
          scheduleStorageSave();
        });
        columnList.appendChild(item);
      });
      applyColumnFilter();
    }

    let filterDebounce = null;
    function columnMatchesSearch(ci, q) {
      if (!q.length) return true;
      return (state.headers[ci] || "").toLowerCase().includes(q);
    }

    function applyColumnFilter() {
      const q = state.searchQuery.toLowerCase();
      columnList.querySelectorAll(".column-item").forEach((el) => {
        const i = Number(el.dataset.index);
        el.classList.toggle("hidden-filter", !columnMatchesSearch(i, q));
      });
      wordGroupsList.querySelectorAll(".word-group-row").forEach((el) => {
        const indices = el.dataset.indices.split(",").map(Number).filter((n) => !Number.isNaN(n));
        const anyMatch = q.length === 0 || indices.some((i) => columnMatchesSearch(i, q));
        el.classList.toggle("hidden-filter", !anyMatch);
      });
    }

    function renderTable() {
      const cols = visibleColumnIndices();
      tableHead.replaceChildren();
      tableBody.replaceChildren();
      if (cols.length === 0) {
        const tr = document.createElement("tr");
        const th = document.createElement("th");
        th.textContent = "Select at least one column";
        tr.appendChild(th);
        tableHead.appendChild(tr);
        return;
      }
      const headRow = document.createElement("tr");
      for (const ci of cols) {
        const th = document.createElement("th");
        th.textContent = state.headers[ci];
        headRow.appendChild(th);
      }
      tableHead.appendChild(headRow);

      const rowsToShow = state.showAllRows
        ? state.rows.map((_, i) => i)
        : state.selectedRowIndex >= 0
          ? [state.selectedRowIndex]
          : [];

      for (const ri of rowsToShow) {
        const tr = document.createElement("tr");
        if (ri === state.selectedRowIndex) tr.classList.add("selected");
        tr.dataset.rowIndex = String(ri);
        for (const ci of cols) {
          const td = document.createElement("td");
          td.textContent = state.rows[ri][ci] ?? "";
          tr.appendChild(td);
        }
        tr.addEventListener("click", () => selectRow(ri));
        tableBody.appendChild(tr);
      }
    }

    function updateTableSelection(prevIdx, nextIdx) {
      if (prevIdx >= 0) {
        const prev = tableBody.querySelector(`tr[data-row-index="${prevIdx}"]`);
        if (prev) prev.classList.remove("selected");
      }
      if (nextIdx >= 0) {
        const next = tableBody.querySelector(`tr[data-row-index="${nextIdx}"]`);
        if (next) next.classList.add("selected");
      }
    }

    function renderDetail() {
      detailGrid.replaceChildren();
      if (state.selectedRowIndex < 0 || state.rows.length === 0) return;
      const ri = state.selectedRowIndex;
      detailTitle.textContent = `Row ${ri + 1} of ${state.rows.length}`;
      const cols = visibleColumnIndices();
      for (const ci of cols) {
        const pair = document.createElement("div");
        pair.className = "detail-pair";
        const dt = document.createElement("dt");
        dt.textContent = state.headers[ci];
        const dd = document.createElement("dd");
        dd.textContent = state.rows[ri][ci] ?? "";
        pair.append(dt, dd);
        detailGrid.appendChild(pair);
      }
    }

    function selectRow(index, opts = {}) {
      if (index < 0 || index >= state.rows.length) return;
      const prevIdx = state.selectedRowIndex;
      state.selectedRowIndex = index;
      rowSlider.value = String(index);
      updateRowControls();
      if (opts.forceTableRebuild || tableBody.childElementCount === 0 || !state.showAllRows) {
        renderTable();
      } else {
        updateTableSelection(prevIdx, index);
      }
      renderDetail();
      if (!opts.fromChart) syncChartCursor();
      const row = tableBody.querySelector(`tr[data-row-index="${index}"]`);
      if (row) row.scrollIntoView({ block: "nearest" });
      scheduleStorageSave();
    }

    function updateRowControls() {
      const n = state.rows.length;
      if (n === 0) {
        rowLabel.textContent = "—";
        return;
      }
      const i = state.selectedRowIndex;
      const elapsed = state.headers.indexOf("elapsed_ms");
      const ms = elapsed >= 0 ? state.rows[i][elapsed] : "";
      rowLabel.textContent = ms ? `Row ${i + 1} · ${ms} ms` : `Row ${i + 1} / ${n}`;
      prevRow.disabled = i <= 0;
      nextRow.disabled = i >= n - 1;
    }

    function loadCsvFromFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        const path = csvPathInput.value.trim() || file.name;
        loadCsvText(reader.result, path);
      };
      reader.readAsText(file);
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files?.[0];
      if (!file) {
        updateFileLabel();
        return;
      }
      loadCsvFromFile(file);
    });

    csvPathLoad.addEventListener("click", () => {
      loadCsvFromPath(csvPathInput.value, null);
    });

    csvPathInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") csvPathLoad.click();
    });

    document.body.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropHint.classList.add("drag-over");
    });
    document.body.addEventListener("dragleave", () => {
      dropHint.classList.remove("drag-over");
    });
    document.body.addEventListener("drop", (e) => {
      e.preventDefault();
      dropHint.classList.remove("drag-over");
      const file = e.dataTransfer?.files?.[0];
      if (!file) return;
      loadCsvFromFile(file);
    });

    logScaleEl.addEventListener("change", () => {
      state.logScale = logScaleEl.checked;
      if (state.logScale && state.yMin != null && state.yMin <= 0) {
        state.yMin = null;
        state.yMax = null;
        yRangeHint.textContent = "Y override cleared (log needs min > 0).";
      }
      renderChart();
      scheduleStorageSave();
    });

    yRangeFromData.addEventListener("click", () => {
      const ext = plottedValueExtents();
      if (!ext) {
        yRangeHint.textContent = "No numeric series selected.";
        return;
      }
      yMinOverride.value = String(ext.min);
      yMaxOverride.value = String(ext.max);
      yRangeHint.textContent = "Adjust limits, then Apply.";
    });

    yRangeApply.addEventListener("click", () => applyYRangeFromInputs());

    yRangeAuto.addEventListener("click", () => clearYRangeOverride());

    xZoomReset.addEventListener("click", () => resetXZoom());

    [yMinOverride, yMaxOverride].forEach((el) => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") applyYRangeFromInputs();
      });
    });

    showAllRowsEl.addEventListener("change", () => {
      state.showAllRows = showAllRowsEl.checked;
      renderTable();
      scheduleStorageSave();
    });

    let resizeDebounce = null;
    const resizeObserver = new ResizeObserver(() => {
      clearTimeout(resizeDebounce);
      resizeDebounce = setTimeout(resizeChart, 80);
    });
    resizeObserver.observe(chartWrap);

    rowSlider.addEventListener("input", () => {
      selectRow(Number(rowSlider.value));
    });
    prevRow.addEventListener("click", () => selectRow(state.selectedRowIndex - 1));
    nextRow.addEventListener("click", () => selectRow(state.selectedRowIndex + 1));

    columnSearch.addEventListener("input", () => {
      state.searchQuery = columnSearch.value;
      clearTimeout(filterDebounce);
      filterDebounce = setTimeout(() => {
        applyColumnFilter();
        scheduleStorageSave();
      }, 100);
    });

    selectAllBtn.addEventListener("click", () => {
      setColumnsVisible(state.headers.map((_, i) => i), true);
    });
    selectNoneBtn.addEventListener("click", () => {
      setColumnsVisible(state.headers.map((_, i) => i), false);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && state.pickedPlotSeries) clearSeriesPick();
    });

    tableWrap.addEventListener("keydown", (e) => {
      if (state.rows.length === 0) return;
      if (e.key === "ArrowDown") {
        e.preventDefault();
        selectRow(Math.min(state.selectedRowIndex + 1, state.rows.length - 1));
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        selectRow(Math.max(state.selectedRowIndex - 1, 0));
      }
    });

    function initFromStorage() {
      const saved = loadSavedState();
      if (!saved) return;
      if (saved.csvPath) {
        state.csvPath = saved.csvPath;
        csvPathInput.value = saved.csvPath;
        loadCsvFromPath(saved.csvPath, saved.config || null, { legacySaved: saved });
        return;
      }
      if (saved.csvText) {
        loadCsvText(saved.csvText, saved.csvPath || "saved.csv", saved.config || null);
      }
    }

    initFromStorage();
  </script>
</body>
</html>
